<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoxelBound - Menu</title>
    <style>
        /* Minecraft-Style Schriftart-Ersatz */
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Press Start 2P', cursive;
            color: white;
            /* Ein dunkler Wald-Hintergrund als Platzhalter */
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://img.freepik.com/free-photo/view-mysterious-forest-with-fog_23-2150774614.jpg?size=626&ext=jpg');
            background-size: cover;
            background-position: center;
        }

        #ui-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            text-shadow: 4px 4px #333;
            margin-bottom: 50px;
            color: #ccc;
        }

        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 300px;
        }

        button {
            background-color: #777;
            border: 3px solid #000;
            color: white;
            padding: 15px;
            font-family: 'Press Start 2P', cursive;
            font-size: 14px;
            cursor: pointer;
            box-shadow: inset -4px -4px #444, inset 4px 4px #aaa;
        }

        button:hover {
            background-color: #888;
            border-color: white;
        }

        /* Charakter-Bereich rechts */
        #character-preview {
            position: absolute;
            right: 10%;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .pixel-char {
            width: 100px;
            height: 180px;
            background-color: #3498db; /* Platzhalter Skin-Farbe */
            border: 4px solid #222;
            margin-bottom: 10px;
        }

        /* Info-Texte unten */
        .footer-left {
            position: absolute;
            bottom: 10px;
            left: 15px;
            font-size: 10px;
        }

        .footer-right {
            position: absolute;
            bottom: 10px;
            right: 15px;
            font-size: 10px;
        }

        /* Mobile Controls Simulation */
        #mobile-controls {
            display: none;
            position: absolute;
            bottom: 50px;
            left: 50px;
        }

        .touch-btn {
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            display: inline-block;
        }
    </style>
</head>
<body>

    <div id="ui-container">
        <h1>VOXELBOUND</h1>

        <div class="menu-buttons">
            <button onclick="startGame()">Play</button>
            <button onclick="openSettings()">Settings</button>
        </div>

        <div id="character-preview">
            <span>MOE</span>
            <div class="pixel-char"></div>
            <button style="width: 150px; font-size: 10px;">Dressing Room</button>
        </div>

        <div class="footer-left">
            Made by MOE 2026
        </div>

        <div class="footer-right">
            v0.0.1 ALPHA
        </div>
    </div>

    <div id="mobile-controls">
        <div class="touch-btn"></div>
    </div>

    <script>
        function startGame() {
            alert("Starting VoxelBound...");
        }

        function openSettings() {
            let mode = prompt("Choose Mode: PC or Mobile").toLowerCase();
            if(mode === "mobile") {
                document.getElementById('mobile-controls').style.display = 'block';
                alert("Mobile Buttons activated!");
            } else {
                document.getElementById('mobile-controls').style.display = 'none';
                alert("PC Mode: Keyboard active.");
            }
        }
    </script>
</body>
</html>
