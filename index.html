<div id="game-container" style="margin: 50px auto; max-width: 400px; position: relative;">
    <h2 style="color: #ff8c00; font-size: 1.2rem; margin-bottom: 10px;">MOE DASH <span class="soon">v0.1 Alpha</span></h2>
    <canvas id="gameCanvas" width="400" height="200" style="border: 2px solid #333; background: #111; border-radius: 10px; cursor: pointer;"></canvas>
    <div id="game-ui" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; pointer-events: none;">
        <p id="start-text" style="color: #fff; font-weight: bold; background: rgba(0,0,0,0.7); padding: 5px 15px; border-radius: 5px;">TAP TO START</p>
    </div>
    <p id="score-text" style="margin-top: 10px; color: #888;">Score: 0</p>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreText = document.getElementById('score-text');
    const startText = document.getElementById('start-text');

    let gameActive = false;
    let score = 0;
    let player = { x: 50, y: 160, w: 30, h: 30, dy: 0, jumpPower: -10, gravity: 0.6, grounded: true };
    let obstacles = [];
    let gameSpeed = 5;

    function drawPlayer() {
        ctx.fillStyle = '#ff8c00'; // Dein Orange
        ctx.shadowBlur = 10;
        ctx.shadowColor = '#ff8c00';
        ctx.fillRect(player.x, player.y, player.w, player.h);
        ctx.shadowBlur = 0;
    }

    function createObstacle() {
        if (Math.random() < 0.02) {
            obstacles.push({ x: 400, y: 165, w: 20, h: 35 });
        }
    }

    function drawObstacles() {
        ctx.fillStyle = '#fff';
        obstacles.forEach((obs, index) => {
            obs.x -= gameSpeed;
            ctx.fillRect(obs.x, obs.y, obs.w, obs.h);

            // Collision Detection
            if (player.x < obs.x + obs.w && player.x + player.w > obs.x &&
                player.y < obs.y + obs.h && player.y + player.h > obs.y) {
                gameOver();
            }

            if (obs.x + obs.w < 0) {
                obstacles.splice(index, 1);
                score++;
                scoreText.innerText = "Score: " + score;
            }
        });
    }

    function update() {
        if (!gameActive) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Ground Line
        ctx.strokeStyle = '#333';
        ctx.beginPath(); ctx.moveTo(0, 195); ctx.lineTo(400, 195); ctx.stroke();

        // Player Physics
        if (!player.grounded) {
            player.dy += player.gravity;
            player.y += player.dy;
        }
        if (player.y >= 165) {
            player.y = 165;
            player.dy = 0;
            player.grounded = true;
        }

        drawPlayer();
        createObstacle();
        drawObstacles();
        requestAnimationFrame(update);
    }

    function gameOver() {
        gameActive = false;
        startText.innerText = "GAME OVER - TAP TO RESTART";
        startText.style.display = "block";
        obstacles = [];
        score = 0;
    }

    canvas.addEventListener('click', () => {
        if (!gameActive) {
            gameActive = true;
            startText.style.display = "none";
            scoreText.innerText = "Score: 0";
            update();
        } else if (player.grounded) {
            player.dy = player.jumpPower;
            player.grounded = false;
        }
    });
</script>
