<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VoxelBound</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: 'Press Start 2P', cursive;
            background: #111; color: white;
        }

        #game-menu {
            display: flex; 
            flex-direction: row; /* Buttons und Char nebeneinander */
            align-items: center;
            justify-content: center; 
            height: 100vh; 
            width: 100vw;
            gap: 50px; /* Abstand zwischen Menü und Charakter */
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
        }

        /* Wenn der Bildschirm schmal ist (Handy Hochformat) */
        @media (max-width: 600px) {
            #game-menu { flex-direction: column; gap: 30px; }
            h1 { font-size: 1.5rem !important; }
        }

        .main-content {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { font-size: 2.2rem; text-shadow: 4px 4px #000; margin-bottom: 30px; }

        .btn-group { display: flex; flex-direction: column; gap: 10px; width: 220px; }

        button {
            background: #555; border: 4px solid #000; color: white;
            padding: 12px; font-family: 'Press Start 2P'; font-size: 10px;
            cursor: pointer; box-shadow: inset -3px -3px #222, inset 3px 3px #888;
        }

        #char-section {
            display: flex; flex-direction: column; align-items: center; gap: 10px;
        }

        .pixel-avatar {
            width: 50px; height: 90px;
            position: relative; background: #3498db;
            border: 4px solid #222;
        }
        .pixel-avatar::before {
            content: ''; position: absolute; top: -30px; left: 5px;
            width: 32px; height: 26px; background: #ffdbac; border: 4px solid #222;
        }

        #player-name-display { font-size: 10px; background: rgba(0,0,0,0.5); padding: 5px; }

        .f-left { position: absolute; bottom: 10px; left: 10px; font-size: 7px; }
        .f-right { position: absolute; bottom: 10px; right: 10px; font-size: 7px; }

        #settings-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 10;
            flex-direction: column; align-items: center; justify-content: center;
        }
        input { padding: 10px; font-family: 'Press Start 2P'; width: 200px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="game-menu">
        <div class="main-content">
            <h1>VOXELBOUND</h1>
            <div class="btn-group">
                <button onclick="alert('Loading...')">Play</button>
                <button onclick="toggleSettings()">Settings</button>
            </div>
        </div>

        <div id="char-section">
            <div class="pixel-avatar"></div>
            <div id="player-name-display">Player</div>
            <button onclick="alert('Soon!')" style="width: 110px; font-size: 7px; padding: 5px;">Dressing Room</button>
        </div>

        <div class="f-left">Made by MOE 2026</div>
        <div class="f-right">v0.0.1 ALPHA</div>
    </div>

    <div id="settings-overlay">
        <h2>Settings</h2>
        <input type="text" id="name-input" placeholder="Name...">
        <button onclick="saveSettings()">Save</button>
    </div>

    <script>
        function toggleSettings() {
            const o = document.getElementById('settings-overlay');
            o.style.display = (o.style.display === 'flex') ? 'none' : 'flex';
        }
        function saveSettings() {
            const n = document.getElementById('name-input').value;
            if(n.trim()) document.getElementById('player-name-display').innerText = n;
            toggleSettings();
        }
    </script>
</body>
</html>
