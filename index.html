<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VoxelBound - Menu</title>
    <style>
        :root {
            --mc-button-gray: #AAAAAA;
            --mc-button-border-dark: #555555;
            --mc-button-border-light: #FFFFFF;
            --mc-font-shadow: 2px 2px #3f3f3f;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace; /* Minecraft-ähnliche Schrift */
            background: #000 url('https://minecraft.wiki/images/Pan_Background_1.17.png') no-repeat center center fixed;
            background-size: cover;
        }

        /* Haupt-Container */
        #menu-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.4);
        }

        /* Titel */
        .title {
            font-size: 3rem;
            color: #FFFFFF;
            text-shadow: 4px 4px #3f3f3f;
            margin-bottom: 40px;
            text-align: center;
        }

        /* Buttons Style */
        .mc-button {
            width: 300px;
            max-width: 80%;
            height: 45px;
            background-color: var(--mc-button-gray);
            border: 3px solid var(--mc-button-border-dark);
            border-top-color: var(--mc-button-border-light);
            border-left-color: var(--mc-button-border-light);
            color: white;
            font-size: 1.2rem;
            text-shadow: var(--mc-font-shadow);
            margin: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            outline: none;
        }

        .mc-button:active {
            border: 3px solid var(--mc-button-border-light);
            border-top-color: var(--mc-button-border-dark);
            border-left-color: var(--mc-button-border-dark);
        }

        /* Charakter & Dressing Room */
        .character-preview {
            position: absolute;
            right: 10%;
            bottom: 15%;
            text-align: center;
        }

        #steve-svg {
            width: 120px;
            height: auto;
            image-rendering: pixelated;
        }

        /* Settings Overlay */
        #settings-screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 100;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Info Texte */
        .version-tag {
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: white;
            font-size: 0.9rem;
        }

        .credits {
            position: absolute;
            bottom: 10px;
            right: 10px;
            color: white;
            font-size: 0.9rem;
        }

        input[type="text"] {
            padding: 10px;
            margin: 10px;
            width: 200px;
            background: #000;
            border: 2px solid #fff;
            color: #fff;
            text-align: center;
        }
    </style>
</head>
<body>

<div id="menu-container">
    <h1 class="title">VOXELBOUND</h1>

    <button class="mc-button" onclick="alert('Starting Game...')">PLAY</button>
    <button class="mc-button" onclick="toggleSettings(true)">SETTINGS</button>

    <div class="character-preview">
        <p id="display-name" style="color: white; text-shadow: 2px 2px #000;">Player</p>
        <svg id="steve-svg" viewBox="0 0 8 8">
            <rect id="steve-body" x="2" y="0" width="4" height="8" fill="#5A5A5A" /> <rect x="2" y="0" width="4" height="4" fill="#ffdbac" /> </svg>
        <button class="mc-button" style="width: 150px; font-size: 0.8rem;" onclick="changeColor()">DRESS ROOM</button>
    </div>

    <div class="version-tag">v1.1.2</div>
    <div class="credits">Made by Mo MOE</div>
</div>

<div id="settings-screen">
    <h2 style="color: white;">SETTINGS</h2>
    
    <button id="btn-music" class="mc-button" onclick="toggleOption('music')">Music: ON</button>
    <button id="btn-sound" class="mc-button" onclick="toggleOption('sound')">Sound: ON</button>
    
    <label style="color: white; margin-top: 10px;">Change Name:</label>
    <input type="text" id="name-input" placeholder="Enter Name..." oninput="updateName()">

    <button class="mc-button" style="margin-top: 30px;" onclick="toggleSettings(false)">BACK</button>
</div>

<script>
    // System Status
    let config = {
        music: true,
        sound: true,
        version: "1.1.2",
        playerColor: "#5A5A5A"
    };

    function toggleSettings(show) {
        document.getElementById('settings-screen').style.display = show ? 'flex' : 'none';
    }

    function toggleOption(type) {
        config[type] = !config[type];
        document.getElementById(`btn-${type}`).innerText = `${type.toUpperCase()}: ${config[type] ? 'ON' : 'OFF'}`;
    }

    function updateName() {
        const name = document.getElementById('name-input').value;
        document.getElementById('display-name').innerText = name || "Player";
    }

    function changeColor() {
        // Einfacher Farbwechsel für den "Dressing Room" Effekt
        const colors = ["#5A5A5A", "#3498db", "#e74c3c", "#2ecc71", "#f1c40f"];
        const randomColor = colors[Math.floor(Math.random() * colors.length)];
        document.getElementById('steve-body').setAttribute('fill', randomColor);
        config.playerColor = randomColor;
    }

    // Anti-Zoom Fix für Mobile
    document.addEventListener('touchmove', function (event) {
        if (event.scale !== 1) { event.preventDefault(); }
    }, { passive: false });
</script>

</body>
</html>
