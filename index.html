<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VoxelBound</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: 'Press Start 2P', cursive;
            background: #444; color: white;
        }

        #game-menu {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
        }

        h1 { font-size: 2.5rem; text-shadow: 5px 5px #000; margin-bottom: 40px; color: #eee; }

        .btn-group { display: flex; flex-direction: column; gap: 10px; width: 280px; }

        button {
            background: #666; border: 4px solid #000; color: white;
            padding: 12px; font-family: 'Press Start 2P'; font-size: 12px;
            cursor: pointer; box-shadow: inset -4px -4px #333, inset 4px 4px #999;
        }

        button:active { transform: scale(0.98); }

        /* Charakter Sektion */
        #char-section {
            position: absolute; right: 8%; top: 50%;
            transform: translateY(-50%); text-align: center;
        }

        #player-name-display { margin-bottom: 15px; font-size: 14px; color: #fff; }

        /* Ein einfacher Pixel-Avatar aus CSS */
        .pixel-avatar {
            width: 80px; height: 120px; margin: 0 auto 15px;
            position: relative; background: #3498db; /* Body */
            border: 4px solid #222;
        }
        .pixel-avatar::before { /* Kopf */
            content: ''; position: absolute; top: -35px; left: 10px;
            width: 52px; height: 35px; background: #ffdbac; border: 4px solid #222;
        }

        /* Footer */
        .f-left { position: absolute; bottom: 10px; left: 15px; font-size: 9px; opacity: 0.7; }
        .f-right { position: absolute; bottom: 10px; right: 15px; font-size: 9px; opacity: 0.7; }

        /* Settings Overlay */
        #settings-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 10;
            flex-direction: column; align-items: center; justify-content: center;
        }

        input {
            padding: 10px; font-family: 'Press Start 2P'; border: 4px solid #000;
            margin-bottom: 20px; text-align: center; width: 250px;
        }
    </style>
</head>
<body>

    <div id="game-menu">
        <h1>VOXELBOUND</h1>

        <div class="btn-group">
            <button onclick="alert('World Loading...')">Play</button>
            <button onclick="toggleSettings()">Settings</button>
        </div>

        <div id="char-section">
            <div id="player-name-display">Player</div>
            <div class="pixel-avatar"></div>
            <button onclick="alert('Skins coming soon!')" style="width: 140px; font-size: 8px;">Dressing Room</button>
        </div>

        <div class="f-left">Made by MOE 2026</div>
        <div class="f-right">v0.0.1 ALPHA</div>
    </div>

    <div id="settings-overlay">
        <h2>Settings</h2>
        <p style="font-size: 10px;">Change Name:</p>
        <input type="text" id="name-input" placeholder="Enter Name...">
        <button onclick="saveSettings()">Save & Close</button>
    </div>

    <script>
        function toggleSettings() {
            const overlay = document.getElementById('settings-overlay');
            overlay.style.display = (overlay.style.display === 'flex') ? 'none' : 'flex';
        }

        function saveSettings() {
            const newName = document.getElementById('name-input').value;
            if(newName.trim() !== "") {
                document.getElementById('player-name-display').innerText = newName;
            }
            toggleSettings();
        }
    </script>
</body>
</html>
