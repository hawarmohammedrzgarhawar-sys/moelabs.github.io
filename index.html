<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VoxelBound</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: 'Press Start 2P', cursive;
            background: #111; color: white;
        }

        /* --- HAUPTMENÜ (UNVERÄNDERT) --- */
        #game-menu {
            display: flex; flex-direction: row; align-items: center; justify-content: center; 
            height: 100vh; width: 100vw; gap: 50px;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
        }

        @media (max-width: 600px) {
            #game-menu { flex-direction: column; gap: 30px; }
            h1 { font-size: 1.5rem !important; }
        }

        .main-content { display: flex; flex-direction: column; align-items: center; }
        h1 { font-size: 2.2rem; text-shadow: 4px 4px #000; margin-bottom: 30px; }
        .btn-group { display: flex; flex-direction: column; gap: 10px; width: 220px; }

        button {
            background: #555; border: 4px solid #000; color: white;
            padding: 12px; font-family: 'Press Start 2P'; font-size: 10px;
            cursor: pointer; box-shadow: inset -3px -3px #222, inset 3px 3px #888;
        }

        #char-section { display: flex; flex-direction: column; align-items: center; gap: 10px; }

        /* --- STEVE PIXEL DESIGN (VERBESSERT) --- */
        .pixel-avatar {
            width: 40px; height: 60px; position: relative; 
            background: #008787; /* T-Shirt */
            border: 4px solid #000;
        }
        
        /* Kopf mit Gesicht */
        .pixel-avatar::before {
            content: ''; position: absolute; top: -44px; left: -4px; 
            width: 40px; height: 36px; background: #ffdbac; 
            border: 4px solid #000;
            /* Haare, Augen und Bart als Box-Shadow "Pixel" */
            box-shadow: 
                inset 0 10px 0 #603b2c, /* Haare oben */
                inset 8px 18px 0 #fff, inset 12px 18px 0 #000, /* Auge links */
                inset 24px 18px 0 #fff, inset 28px 18px 0 #000, /* Auge rechts */
                inset 12px 28px 0 #603b2c; /* Bart/Mund */
        }

        /* Beine und Arme */
        .pixel-avatar::after {
            content: ''; position: absolute; bottom: -34px; left: -4px;
            width: 40px; height: 30px; background: #4040ff; /* Hose */
            border: 4px solid #000;
            box-shadow: 
                -24px -34px 0 #008787, -24px -34px 0 4px #000, /* Arm links */
                24px -34px 0 #008787, 24px -34px 0 4px #000; /* Arm rechts */
        }

        #player-name-display { font-size: 10px; background: rgba(0,0,0,0.5); padding: 5px; margin-top: 35px; }

        .f-left { position: absolute; bottom: 10px; left: 10px; font-size: 7px; }
        .f-right { position: absolute; bottom: 10px; right: 10px; font-size: 7px; }

        /* --- SETTINGS LISTE DESIGN --- */
        #settings-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(20, 20, 20, 0.95); z-index: 100;
            flex-direction: column; align-items: center; justify-content: center;
        }

        .settings-list {
            display: flex; flex-direction: column; gap: 20px; width: 300px;
            background: #333; padding: 30px; border: 4px solid #000;
            position: relative;
        }

        .setting-item { display: flex; flex-direction: column; gap: 10px; }

        .setting-row { 
            display: flex; justify-content: space-between; align-items: center; 
            font-size: 10px;
        }

        input { 
            padding: 8px; font-family: 'Press Start 2P'; font-size: 10px;
            border: 3px solid #000; text-align: center; background: #eee;
        }

        .toggle-btn { width: 80px; padding: 5px; font-size: 8px; }

        .back-btn {
            position: absolute; bottom: -50px; left: 0;
            background: #a33; width: 100px;
        }

    </style>
</head>
<body>

    <div id="game-menu">
        <div class="main-content">
            <h1>VOXELBOUND</h1>
            <div class="btn-group">
                <button onclick="alert('Loading World...')">Play</button>
                <button onclick="toggleSettings()">Settings</button>
            </div>
        </div>

        <div id="char-section">
            <div class="pixel-avatar"></div>
            <div id="player-name-display">Player</div>
            <button onclick="alert('Soon!')" style="width: 110px; font-size: 7px; padding: 5px;">Dressing Room</button>
        </div>

        <div class="f-left">Made by MOE 2026</div>
        <div class="f-right">v0.0.1 ALPHA</div>
    </div>

    <div id="settings-overlay">
        <div class="settings-list">
            <h2 style="font-size: 14px; margin-bottom: 10px; text-align: center;">SETTINGS</h2>
            
            <div class="setting-item">
                <span style="font-size: 8px;">Character Name:</span>
                <input type="text" id="name-input" placeholder="Player">
            </div>

            <hr style="width: 100%; border: 1px solid #555;">

            <div class="setting-row">
                <span>Music:</span>
                <button class="toggle-btn" id="music-btn" onclick="toggleOption('music-btn')">ON</button>
            </div>

            <div class="setting-row">
                <span>Sounds:</span>
                <button class="toggle-btn" id="sound-btn" onclick="toggleOption('sound-btn')">ON</button>
            </div>

            <button class="back-btn" onclick="saveAndClose()">BACK</button>
        </div>
    </div>

    <script>
        function toggleSettings() {
            const o = document.getElementById('settings-overlay');
            o.style.display = (o.style.display === 'flex') ? 'none' : 'flex';
            if (o.style.display === 'flex') {
                document.getElementById('name-input').value = document.getElementById('player-name-display').innerText;
            }
        }

        function toggleOption(id) {
            const btn = document.getElementById(id);
            btn.innerText = (btn.innerText === 'ON') ? 'OFF' : 'ON';
            btn.style.background = (btn.innerText === 'ON') ? '#555' : '#333';
        }

        function saveAndClose() {
            const n = document.getElementById('name-input').value;
            if(n.trim()) {
                document.getElementById('player-name-display').innerText = n;
            }
            toggleSettings();
        }
    </script>
</body>
</html>
