<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Horror World - Project MOE</title>
    <style>
        /* --- UNVERÄNDERTES GRUND-SETUP & MENÜS --- */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Segoe UI', sans-serif; background-color: #000; color: white; }
        .bg-layer { position: absolute; width: 100%; height: 100%; background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.9)), url('https://images.unsplash.com/photo-1536697246741-98a6d9146011?q=80&w=2500&auto=format&fit=crop'); background-size: cover; z-index: -2; }
        .character-placeholder { position: absolute; bottom: 0; right: 5%; width: 40%; height: 70%; background: url('https://i.imgur.com/39YvC9h.png'); background-size: contain; background-repeat: no-repeat; background-position: bottom; z-index: -1; opacity: 0.8; }
        .main-menu, .settings-menu, .level-menu { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; z-index: 10; position: absolute; width: 100%; }
        .settings-menu, .level-menu { display: none; background: rgba(0, 0, 0, 0.92); }
        h1, h2 { font-size: clamp(2.2rem, 7vw, 4rem); margin-bottom: 30px; text-transform: uppercase; letter-spacing: 8px; text-align: center; text-shadow: 0 0 20px rgba(255, 0, 0, 0.3); }
        .btn { width: 260px; padding: 16px; background: rgba(15, 20, 15, 0.8); border: 1px solid #3d5e32; color: #bcbcbc; font-size: 1rem; cursor: pointer; text-transform: uppercase; display: flex; justify-content: center; }
        .level-scroll-view { display: flex; gap: 15px; overflow-x: auto; padding: 20px; width: 90%; max-width: 1000px; }
        .level-card { min-width: 160px; height: 220px; background: #0a0a0a; border: 2px solid #222; display: flex; flex-direction: column; align-items: center; justify-content: space-around; padding: 15px; }
        .pixel-icon { width: 60px; height: 60px; background: #1a1a1a; border: 2px dashed #333; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
        .house-icon { border-color: #772222; color: #ff4444; }

        /* --- NEUES INGAME SYSTEM (9:16) --- */
        #gameContainer {
            display: none;
            position: absolute;
            width: 100%; height: 100%;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            background: #000;
            z-index: 100;
        }

        /* Das eigentliche Spielfenster */
        #viewport916 {
            width: 100vw;
            height: calc(100vw * 16 / 9);
            max-height: 80vh;
            background: #0a0a0a;
            position: relative;
            overflow: hidden;
            border: 2px solid #111;
        }

        /* Externe Steuerung (Unter dem Display) */
        #externalControls {
            width: 100%;
            flex-grow: 1;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            background: #000;
        }

        .control-btn {
            width: 60px; height: 60px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem;
        }

        /* Ingame HUD */
        .ingame-hud {
            position: absolute; width: 100%; padding: 15px;
            display: flex; justify-content: space-between; align-items: center;
            box-sizing: border-box; z-index: 110;
        }
        .room-tag { font-size: 0.8rem; color: #ff4d4d; border: 1px solid #ff4d4d; padding: 2px 8px; }
        .hud-right { display: flex; gap: 10px; align-items: center; }

        /* Räume */
        .room-scene {
            width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; filter: blur(15px);
        }
        .room-active { animation: wakeUpAnim 3s forwards; }

        .bed-pixel { width: 120px; height: 60px; background: #222; border-bottom: 4px solid #111; margin-top: 40px; }
        .door-pixel { width: 60px; height: 100px; background: #1a110a; border: 2px solid #000; position: absolute; right: 20px; }

        @keyframes wakeUpAnim {
            to { opacity: 1; filter: blur(0); }
        }

        .status { font-weight: bold; color: #4dfd4d; }
        .status.off { color: #ff4d4d; }
    </style>
</head>
<body>

    <div class="bg-layer"></div>
    <div class="main-menu" id="mainMenu">
        <h1>Horror<br>World</h1>
        <div class="btn-container">
            <button class="btn" onclick="openLevelMenu()">Start Game</button>
            <button class="btn" onclick="toggleSettings('main')">Settings</button>
        </div>
    </div>

    <div class="level-menu" id="levelMenu">
        <h2>Select Area</h2>
        <div class="level-scroll-view">
            <div class="level-card" onclick="launchGame()">
                <div class="pixel-icon house-icon">🏚️</div>
                <h3>Dark House</h3>
                <span style="font-size:0.7rem; color:#666">Easy</span>
            </div>
            <div class="level-card" style="opacity:0.4">
                <div class="pixel-icon">🔒</div>
                <h3>Secret</h3>
            </div>
        </div>
        <button class="btn" style="margin-top: 30px; width: 140px;" onclick="backToMain()">Back</button>
    </div>

    <div id="gameContainer">
        <div id="viewport916">
            <div class="ingame-hud">
                <div class="room-tag" id="roomDisplay">Room #1</div>
                <div class="hud-right">
                    <div style="color: #ff4d4d;">❤️❤️❤️❤️</div>
                    <div style="cursor:pointer; font-size: 1.5rem;" onclick="toggleSettings('game')">⚙️</div>
                </div>
            </div>

            <div id="room1" class="room-scene" onclick="standUp()">
                <div class="door-pixel"></div>
                <div class="bed-pixel"></div>
                <p id="wakeHint" style="color:#555; margin-top:20px; font-style:italic;">Tap to wake up...</p>
            </div>
        </div>

        <div id="externalControls">
            <div class="control-btn">⬅️</div>
            <div class="control-btn">⬆️</div>
            <div class="control-btn">➡️</div>
            <div class="control-btn" style="background:#331111"> Crouch </div>
            <div class="control-btn" style="background:#112211"> Jump </div>
        </div>
    </div>

    <div class="settings-menu" id="settingsMenu">
        <h2 id="settingsTitle">Settings</h2>
        <div class="btn-container" id="settingsBtnContainer">
            <button class="btn" onclick="toggleOption(this)">Sound: <span class="status">ON</span></button>
            <button class="btn" onclick="toggleOption(this)">Music: <span class="status">ON</span></button>
            <button class="btn" id="resumeBtn" style="display:none; background: #1a2e1a;" onclick="closeSettings()">Resume</button>
            <button class="btn" id="backBtn" style="margin-top: 20px; border-color: #552222;" onclick="backToMain()">Back</button>
        </div>
    </div>

    <div class="footer">
        <div>v0.1</div>
        <div>Made by MOE 2026</div>
    </div>

    <script>
        const mainMenu = document.getElementById('mainMenu');
        const levelMenu = document.getElementById('levelMenu');
        const settingsMenu = document.getElementById('settingsMenu');
        const gameContainer = document.getElementById('gameContainer');
        const room1 = document.getElementById('room1');

        function openLevelMenu() {
            mainMenu.style.display = 'none';
            levelMenu.style.display = 'flex';
        }

        function toggleSettings(mode) {
            mainMenu.style.display = 'none';
            levelMenu.style.display = 'none';
            settingsMenu.style.display = 'flex';
            
            const resumeBtn = document.getElementById('resumeBtn');
            const backBtn = document.getElementById('backBtn');

            if (mode === 'game') {
                resumeBtn.style.display = 'flex';
                backBtn.innerText = "Quit to Menu";
                backBtn.onclick = () => location.reload(); // Einfachster Weg zurück
            } else {
                resumeBtn.style.display = 'none';
                backBtn.innerText = "Back";
                backBtn.onclick = backToMain;
            }
        }

        function closeSettings() {
            settingsMenu.style.display = 'none';
        }

        function backToMain() {
            levelMenu.style.display = 'none';
            settingsMenu.style.display = 'none';
            gameContainer.style.display = 'none';
            mainMenu.style.display = 'flex';
        }

        function launchGame() {
            levelMenu.style.display = 'none';
            gameContainer.style.display = 'flex';
            room1.classList.add('room-active');
        }

        function standUp() {
            document.getElementById('wakeHint').style.display = 'none';
            room1.style.background = "#111"; // Charakter "steht" nun im Raum
        }

        function toggleOption(btn) {
            const s = btn.querySelector('.status');
            if(s.innerText === 'ON') { s.innerText = 'OFF'; s.classList.add('off'); }
            else { s.innerText = 'ON'; s.classList.remove('off'); }
        }
    </script>
</body>
</html>
