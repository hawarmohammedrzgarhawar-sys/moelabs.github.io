<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VoxelBound</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: 'Press Start 2P', cursive;
            background: #111; color: white;
        }

        /* --- DEIN MENÜ (UNANGEFASST) --- */
        #game-menu {
            display: flex; flex-direction: row; align-items: center; justify-content: center; 
            height: 100vh; width: 100vw; gap: 60px;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            position: absolute; top: 0; left: 0; z-index: 20;
        }

        @media (max-width: 600px) {
            #game-menu { flex-direction: column; gap: 40px; }
            h1 { font-size: 1.5rem !important; }
        }

        .main-content { display: flex; flex-direction: column; align-items: center; }
        h1 { font-size: 2.2rem; text-shadow: 4px 4px #000; margin-bottom: 30px; }
        .btn-group { display: flex; flex-direction: column; gap: 10px; width: 220px; }

        button {
            background: #555; border: 4px solid #000; color: white;
            padding: 12px; font-family: 'Press Start 2P'; font-size: 10px;
            cursor: pointer; box-shadow: inset -3px -3px #222, inset 3px 3px #888;
        }

        #char-section { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .steve-svg { width: 100px; height: 180px; filter: drop-shadow(4px 4px 0px #000); }
        #player-name-display { font-size: 10px; background: rgba(0,0,0,0.5); padding: 5px; }

        .overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(20, 20, 20, 0.95); z-index: 100;
            flex-direction: column; align-items: center; justify-content: center;
        }
        .window {
            display: flex; flex-direction: column; gap: 15px; width: 320px;
            background: #333; padding: 25px; border: 4px solid #000; position: relative;
        }

        .setting-row { display: flex; justify-content: space-between; align-items: center; font-size: 8px; margin-top: 5px;}
        input[type="text"] { padding: 8px; font-family: 'Press Start 2P'; font-size: 10px; border: 3px solid #000; text-align: center; width: 80%; margin: 0 auto;}
        input[type="range"] { cursor: pointer; accent-color: #555; width: 100px; }
        
        .color-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 10px; }
        .color-box { width: 40px; height: 40px; border: 3px solid #000; cursor: pointer; }

        .back-btn { position: absolute; bottom: -50px; left: 0; background: #a33; width: 100px; padding: 8px; font-size: 8px;}

        .f-left, .f-right { position: absolute; bottom: 10px; font-size: 7px; opacity: 0.5; }
        .f-left { left: 10px; } .f-right { right: 10px; }

        /* --- HANDY CONTROLS (NUR IN-GAME) --- */
        #mobile-hud { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        .d-pad { position: absolute; bottom: 30px; left: 30px; display: grid; grid-template-columns: repeat(3, 60px); grid-template-rows: repeat(3, 60px); pointer-events: auto; }
        .d-btn { background: rgba(85,85,85,0.5); border: 2px solid #fff; display: flex; align-items: center; justify-content: center; font-size: 18px; user-select: none; touch-action: none; }
        #jump-btn { position: absolute; bottom: 50px; right: 40px; width: 80px; height: 80px; background: rgba(85,85,85,0.5); border: 3px solid #fff; border-radius: 50%; pointer-events: auto; display: flex; align-items: center; justify-content: center; font-size: 10px; }
        #crosshair { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 24px; pointer-events: none; }
    </style>
</head>
<body>

    <div id="game-menu">
        <div class="main-content">
            <h1>VOXELBOUND</h1>
            <div class="btn-group">
                <button onclick="startGame()">Play</button>
                <button onclick="openOverlay('settings-overlay')">Settings</button>
            </div>
        </div>

        <div id="char-section">
            <svg id="main-steve" class="steve-svg" viewBox="0 0 80 140" xmlns="http://www.w3.org/2000/svg">
                <rect x="20" y="90" width="40" height="50" fill="#4a4abf" stroke="#000" stroke-width="2"/>
                <rect x="20" y="130" width="40" height="10" fill="#333"/>
                <rect id="arm-l" x="2" y="40" width="18" height="50" fill="#00b9d1" stroke="#000" stroke-width="2"/>
                <rect id="arm-r" x="60" y="40" width="18" height="50" fill="#00b9d1" stroke="#000" stroke-width="2"/>
                <rect id="shirt" x="20" y="40" width="40" height="52" fill="#00b9d1" stroke="#000" stroke-width="2"/>
                <rect x="20" y="0" width="40" height="40" fill="#d1a083" stroke="#000" stroke-width="2"/>
                <rect x="20" y="0" width="40" height="10" fill="#5b3927"/>
                <rect x="26" y="18" width="6" height="4" fill="#fff"/><rect x="29" y="18" width="3" height="4" fill="#6e50c4"/>
                <rect x="48" y="18" width="6" height="4" fill="#fff"/><rect x="48" y="18" width="3" height="4" fill="#6e50c4"/>
                <rect x="34" y="26" width="12" height="4" fill="#7b4d35"/>
            </svg>
            <div id="player-name-display">Player</div>
            <button onclick="openOverlay('dressing-overlay')" style="width: 130px; font-size: 7px; padding: 5px;">Dressing Room</button>
        </div>
        <div class="f-left">Made by MOE 2026</div>
        <div class="f-right">v0.0.1 ALPHA</div>
    </div>

    <div id="mobile-hud">
        <div id="crosshair">+</div>
        <div class="d-pad">
            <div></div><div class="d-btn" id="move-f">▲</div><div></div>
            <div class="d-btn" id="move-l">◀</div><div></div><div class="d-btn" id="move-r">▶</div>
            <div></div><div class="d-btn" id="move-b">▼</div><div></div>
        </div>
        <div id="jump-btn">JUMP</div>
    </div>

    <div id="settings-overlay" class="overlay">
        <div class="window">
            <h2 style="font-size: 12px; text-align: center;">SETTINGS</h2>
            <input type="text" id="name-input" placeholder="Name">
            <hr style="width:100%; border:1px solid #555;">
            <div class="setting-row"><span>Music:</span><button onclick="toggleBtn(this)">ON</button></div>
            <div class="setting-row"><span>Sounds:</span><button onclick="toggleBtn(this)">ON</button></div>
            <div class="setting-row"><span>Render:</span><input type="range" min="2" max="32" value="12"></div>
            <div class="setting-row"><span>FOV:</span><input type="range" min="60" max="110" value="70"></div>
            <button class="back-btn" onclick="saveSettings()">BACK</button>
        </div>
    </div>

    <div id="dressing-overlay" class="overlay">
        <div class="window">
            <h2 style="font-size: 12px; text-align: center;">DRESSING ROOM</h2>
            <div class="color-grid">
                <div class="color-box" style="background:#00b9d1" onclick="changeShirt('#00b9d1')"></div>
                <div class="color-box" style="background:#d10000" onclick="changeShirt('#d10000')"></div>
                <div class="color-box" style="background:#00d123" onclick="changeShirt('#00d123')"></div>
                <div class="color-box" style="background:#d1bd00" onclick="changeShirt('#d1bd00')"></div>
            </div>
            <button class="back-btn" onclick="closeOverlay('dressing-overlay')">DONE</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, animals = [];
        let move = { f: false, b: false, l: false, r: false, jump: false };
        let velocity = new THREE.Vector3();
        let rotation = { yaw: 0, pitch: 0 };

        function startGame() {
            document.getElementById('game-menu').style.display = 'none';
            document.getElementById('mobile-hud').style.display = 'block';
            init3D();
        }

        function init3D() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
            
            renderer = new THREE.WebGLRenderer({ antialias: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.8));

            // Welt: 16x16 flach mit Glaswand
            const geo = new THREE.BoxGeometry(1, 1, 1);
            const grassMat = new THREE.MeshLambertMaterial({ color: 0x559944 });
            const glassMat = new THREE.MeshLambertMaterial({ color: 0xffffff, transparent: true, opacity: 0.3 });

            for(let x = -8; x <= 8; x++) {
                for(let z = -8; z <= 8; z++) {
                    const block = new THREE.Mesh(geo, grassMat);
                    block.position.set(x, 0, z);
                    scene.add(block);

                    // Glaswand an den Grenzen
                    if(Math.abs(x) === 8 || Math.abs(z) === 8) {
                        for(let y = 1; y < 4; y++) {
                            const wall = new THREE.Mesh(geo, glassMat);
                            wall.position.set(x, y, z);
                            scene.add(wall);
                        }
                    }
                }
            }

            // Tiere (Hüpfende Schafe)
            for(let i=0; i<3; i++) {
                const sheep = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.8), new THREE.MeshLambertMaterial({color: 0xffffff}));
                sheep.position.set(Math.random()*6-3, 1, Math.random()*6-3);
                scene.add(sheep);
                animals.push(sheep);
            }

            camera.position.set(0, 1.7, 0);
            setupMobileControls();
            animate();
        }

        function setupMobileControls() {
            const bind = (id, key) => {
                const el = document.getElementById(id);
                el.ontouchstart = (e) => { e.preventDefault(); move[key] = true; };
                el.ontouchend = () => move[key] = false;
            };
            bind('move-f', 'f'); bind('move-b', 'b'); bind('move-l', 'l'); bind('move-r', 'r');
            document.getElementById('jump-btn').ontouchstart = () => { if(camera.position.y <= 1.8) velocity.y = 0.15; };

            // Umsehen durch Wischen auf rechter Seite
            let lastX, lastY;
            window.ontouchmove = (e) => {
                let touch = e.touches[0];
                if(touch.clientX > window.innerWidth / 2) {
                    if(lastX) {
                        rotation.yaw -= (touch.clientX - lastX) * 0.005;
                        rotation.pitch -= (touch.clientY - lastY) * 0.005;
                        rotation.pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, rotation.pitch));
                    }
                    lastX = touch.clientX; lastY = touch.clientY;
                }
            };
            window.ontouchend = () => { lastX = null; lastY = null; };
        }

        function animate() {
            requestAnimationFrame(animate);

            // Bewegung berechnen
            camera.rotation.order = 'YXZ';
            camera.rotation.y = rotation.yaw;
            camera.rotation.x = rotation.pitch;

            const speed = 0.08;
            if (move.f) camera.translateZ(-speed);
            if (move.b) camera.translateZ(speed);
            if (move.l) camera.translateX(-speed);
            if (move.r) camera.translateX(speed);

            // Schwerkraft & Grenzen
            camera.position.y += velocity.y;
            if(camera.position.y > 1.7) velocity.y -= 0.01;
            else { camera.position.y = 1.7; velocity.y = 0; }

            // Wall-Collision (Ganz simpel)
            camera.position.x = Math.max(-7.4, Math.min(7.4, camera.position.x));
            camera.position.z = Math.max(-7.4, Math.min(7.4, camera.position.z));

            // Tiere hüpfen lassen
            animals.forEach(a => { a.position.y = 0.8 + Math.abs(Math.sin(Date.now()*0.005))*0.5; });

            renderer.render(scene, camera);
        }

        // --- MENÜ FUNKTIONEN (DEIN ORIGINAL) ---
        function openOverlay(id) { document.getElementById(id).style.display = 'flex'; }
        function closeOverlay(id) { document.getElementById(id).style.display = 'none'; }
        function saveSettings() { closeOverlay('settings-overlay'); }
        function toggleBtn(btn) { btn.innerText = (btn.innerText === 'ON') ? 'OFF' : 'ON'; }
        function changeShirt(color) { 
            document.getElementById('shirt').setAttribute('fill', color);
            document.getElementById('arm-l').setAttribute('fill', color);
            document.getElementById('arm-r').setAttribute('fill', color);
        }
    </script>
</body>
</html>
