<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horror World - Project MOE</title>
    <style>
        /* Grund-Setup */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000;
            color: white;
        }

        /* DER HINTERGRUND */
        .bg-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.9)), 
                        url('https://images.unsplash.com/photo-1536697246741-98a6d9146011?q=80&w=2500&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            z-index: -2;
            filter: contrast(1.2) brightness(0.6) grayscale(0.3);
        }

        .character-placeholder {
            position: absolute;
            bottom: 0;
            right: 5%;
            width: 40%;
            height: 70%;
            background: url('https://i.imgur.com/39YvC9h.png'); 
            background-size: contain;
            background-repeat: no-repeat;
            background-position: bottom;
            z-index: -1;
            opacity: 0.8;
        }

        .mist {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at bottom, rgba(30,40,30,0.3) 0%, transparent 80%);
            z-index: -1;
        }

        /* CONTAINER LOGIK */
        .main-menu, .settings-menu, .level-menu {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            z-index: 10;
            position: absolute;
            width: 100%;
            transition: 0.5s ease-in-out;
        }

        .settings-menu, .level-menu {
            display: none;
            background: rgba(0, 0, 0, 0.9);
        }

        h1, h2 {
            font-size: clamp(2.5rem, 8vw, 5rem);
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 10px;
            text-align: center;
            text-shadow: 0 0 30px rgba(255, 0, 0, 0.2), 0 0 10px rgba(100, 255, 100, 0.3), 4px 4px 15px rgba(0,0,0,1);
        }

        /* BUTTONS */
        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            width: 260px;
            padding: 18px;
            background: rgba(15, 20, 15, 0.8);
            border: 1px solid #3d5e32;
            color: #bcbcbc;
            font-size: 1.1rem;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn:hover {
            background: #2d4a24;
            color: white;
            box-shadow: 0 0 25px rgba(50, 80, 40, 0.6);
            transform: translateY(-3px);
        }

        /* LEVEL AUSWAHL DESIGN */
        .level-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 900px;
        }

        .level-card {
            width: 220px;
            height: 300px;
            background: rgba(20, 20, 20, 0.8);
            border: 2px solid #3d5e32;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding: 20px;
            cursor: pointer;
            transition: 0.4s;
            position: relative;
            overflow: hidden;
            text-align: center;
        }

        .level-card:hover {
            transform: scale(1.05);
            border-color: #4dfd4d;
            box-shadow: 0 0 30px rgba(77, 253, 77, 0.2);
        }

        .level-card.locked {
            opacity: 0.5;
            cursor: not-allowed;
            border-color: #444;
        }

        .level-card h3 {
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 1.2rem;
        }

        .level-card p {
            font-size: 0.8rem;
            color: #888;
        }

        /* FOOTER */
        .footer {
            position: absolute;
            bottom: 25px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 50px;
            box-sizing: border-box;
            font-size: 0.85rem;
            font-weight: 300;
            letter-spacing: 1px;
            color: rgba(255,255,255,0.4);
            z-index: 20;
        }

        .status { font-weight: bold; color: #4dfd4d; }
        .status.off { color: #ff4d4d; }
    </style>
</head>
<body>

    <div class="bg-layer"></div>
    <div class="mist"></div>
    <div class="character-placeholder"></div>

    <div class="main-menu" id="mainMenu">
        <h1>Horror<br>World</h1>
        <div class="btn-container">
            <button class="btn" onclick="openLevelMenu()">Start Game</button>
            <button class="btn" onclick="toggleSettings()">Settings</button>
        </div>
    </div>

    <div class="level-menu" id="levelMenu">
        <h2>Select Level</h2>
        <div class="level-container">
            <div class="level-card" onclick="startLevel(1)">
                <h3>The Dark House</h3>
                <p>Difficulty: Easy</p>
            </div>
            <div class="level-card" onclick="startLevel(2)">
                <h3>The Asylum</h3>
                <p>Difficulty: Hard</p>
            </div>
            <div class="level-card locked">
                <h3>Coming Soon</h3>
                <p>Stay tuned...</p>
            </div>
        </div>
        <button class="btn" style="margin-top: 40px; width: 150px; justify-content: center;" onclick="backToMain()">Back</button>
    </div>

    <div class="settings-menu" id="settingsMenu">
        <h2>Settings</h2>
        <div class="btn-container">
            <button class="btn" onclick="toggleSetting(this, 'Sound')">
                Sound: <span class="status">ON</span>
            </button>
            <button class="btn" onclick="toggleSetting(this, 'Music')">
                Music: <span class="status">ON</span>
            </button>
            <button class="btn" style="margin-top: 20px; border-color: #5e3232; justify-content: center;" onclick="backToMain()">Back</button>
        </div>
    </div>

    <div class="footer">
        <div>Version v0.1</div>
        <div>Made by MOE 2026</div>
    </div>

    <script>
        const mainMenu = document.getElementById('mainMenu');
        const settingsMenu = document.getElementById('settingsMenu');
        const levelMenu = document.getElementById('levelMenu');

        function openLevelMenu() {
            mainMenu.style.display = 'none';
            levelMenu.style.display = 'flex';
        }

        function toggleSettings() {
            mainMenu.style.display = 'none';
            settingsMenu.style.display = 'flex';
        }

        function backToMain() {
            levelMenu.style.display = 'none';
            settingsMenu.style.display = 'none';
            mainMenu.style.display = 'flex';
        }

        function startLevel(num) {
            alert("Loading Level " + num + "...");
        }

        function toggleSetting(btn, type) {
            const statusSpan = btn.querySelector('.status');
            if (statusSpan.innerText === 'ON') {
                statusSpan.innerText = 'OFF';
                statusSpan.classList.add('off');
            } else {
                statusSpan.innerText = 'ON';
                statusSpan.classList.remove('off');
            }
        }
    </script>
</body>
</html>
