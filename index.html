<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horror World - Project MOE</title>
    <style>
        /* Grund-Setup */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000;
            color: white;
        }

        /* DER HINTERGRUND (Hauptmenü Vibe) */
        .bg-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.9)), 
                        url('https://images.unsplash.com/photo-1536697246741-98a6d9146011?q=80&w=2500&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            z-index: -2;
            filter: contrast(1.2) brightness(0.6) grayscale(0.3);
        }

        .character-placeholder {
            position: absolute;
            bottom: 0;
            right: 5%;
            width: 40%;
            height: 70%;
            background: url('https://i.imgur.com/39YvC9h.png'); 
            background-size: contain;
            background-repeat: no-repeat;
            background-position: bottom;
            z-index: -1;
            opacity: 0.8;
        }

        .mist {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at bottom, rgba(30,40,30,0.3) 0%, transparent 80%);
            z-index: -1;
        }

        /* CONTAINER LOGIK */
        .main-menu, .settings-menu, .level-menu {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            z-index: 10;
            position: absolute;
            width: 100%;
            transition: 0.5s ease-in-out;
        }

        .settings-menu, .level-menu {
            display: none;
            background: rgba(0, 0, 0, 0.92);
        }

        h1, h2 {
            font-size: clamp(2.2rem, 7vw, 4rem);
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 8px;
            text-align: center;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.3), 0 0 10px rgba(100, 255, 100, 0.2);
        }

        /* BUTTONS */
        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            width: 260px;
            padding: 16px;
            background: rgba(15, 20, 15, 0.8);
            border: 1px solid #3d5e32;
            color: #bcbcbc;
            font-size: 1rem;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn:hover {
            background: #2d4a24;
            color: white;
            box-shadow: 0 0 20px rgba(50, 80, 40, 0.6);
        }

        /* NEUES LEVEL DESIGN (PIXEL-ISH & KOMPAKT) */
        .level-scroll-view {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding: 20px;
            width: 90%;
            max-width: 1000px;
            scrollbar-width: none; /* Versteckt Scrollbar */
        }
        .level-scroll-view::-webkit-scrollbar { display: none; }

        .level-card {
            min-width: 160px;
            height: 220px;
            background: #0a0a0a;
            border: 2px solid #222;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-around;
            padding: 15px;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
        }

        .level-card:hover {
            border-color: #4a773c;
            transform: translateY(-5px);
            background: #111;
        }

        /* Platzhalter für Pixel-Icons */
        .pixel-icon {
            width: 60px;
            height: 60px;
            background: #1a1a1a;
            border: 2px dashed #333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .house-icon { border-color: #772222; color: #ff4444; }
        .asylum-icon { border-color: #225577; color: #44aaff; }

        .level-card h3 {
            font-size: 0.9rem;
            margin: 10px 0 5px 0;
            letter-spacing: 1px;
        }

        .level-card .diff {
            font-size: 0.7rem;
            color: #666;
            text-transform: uppercase;
        }

        .locked { opacity: 0.4; cursor: not-allowed; }

        /* FOOTER */
        .footer {
            position: absolute;
            bottom: 25px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 30px;
            box-sizing: border-box;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.3);
            z-index: 20;
        }

        .status { font-weight: bold; color: #4dfd4d; }
        .status.off { color: #ff4d4d; }
    </style>
</head>
<body>

    <div class="bg-layer"></div>
    <div class="mist"></div>
    <div class="character-placeholder"></div>

    <div class="main-menu" id="mainMenu">
        <h1>Horror<br>World</h1>
        <div class="btn-container">
            <button class="btn" onclick="openLevelMenu()">Start Game</button>
            <button class="btn" onclick="toggleSettings()">Settings</button>
        </div>
    </div>

    <div class="level-menu" id="levelMenu">
        <h2>Select Area</h2>
        <div class="level-scroll-view">
            <div class="level-card" onclick="startLevel(1)">
                <div class="pixel-icon house-icon">🏚️</div>
                <h3>Dark House</h3>
                <span class="diff">Easy</span>
            </div>
            <div class="level-card" onclick="startLevel(2)">
                <div class="pixel-icon asylum-icon">🏥</div>
                <h3>Asylum</h3>
                <span class="diff">Hard</span>
            </div>
            <div class="level-card locked">
                <div class="pixel-icon">🔒</div>
                <h3>Secret</h3>
                <span class="diff">Coming Soon</span>
            </div>
        </div>
        <button class="btn" style="margin-top: 30px; width: 140px;" onclick="backToMain()">Back</button>
    </div>

    <div class="settings-menu" id="settingsMenu">
        <h2>Settings</h2>
        <div class="btn-container">
            <button class="btn" onclick="toggleSetting(this)">Sound: <span class="status">ON</span></button>
            <button class="btn" onclick="toggleSetting(this)">Music: <span class="status">ON</span></button>
            <button class="btn" style="margin-top: 20px; border-color: #552222;" onclick="backToMain()">Back</button>
        </div>
    </div>

    <div class="footer">
        <div>v0.1</div>
        <div>Made by MOE 2026</div>
    </div>

    <script>
        const mainMenu = document.getElementById('mainMenu');
        const settingsMenu = document.getElementById('settingsMenu');
        const levelMenu = document.getElementById('levelMenu');

        function openLevelMenu() {
            mainMenu.style.display = 'none';
            levelMenu.style.display = 'flex';
        }

        function toggleSettings() {
            mainMenu.style.display = 'none';
            settingsMenu.style.display = 'flex';
        }

        function backToMain() {
            levelMenu.style.display = 'none';
            settingsMenu.style.display = 'none';
            mainMenu.style.display = 'flex';
        }

        function startLevel(num) {
            alert("Entering level " + num + "...");
        }

        function toggleSetting(btn) {
            const status = btn.querySelector('.status');
            if (status.innerText === 'ON') {
                status.innerText = 'OFF';
                status.classList.add('off');
            } else {
                status.innerText = 'ON';
                status.classList.remove('off');
            }
        }
    </script>
</body>
</html>
