<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VoxelBound</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: 'Press Start 2P', cursive;
            background: #111; color: white;
        }

        #game-menu {
            display: flex; flex-direction: row; align-items: center; justify-content: center; 
            height: 100vh; width: 100vw; gap: 60px;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
        }

        @media (max-width: 600px) {
            #game-menu { flex-direction: column; gap: 40px; }
            h1 { font-size: 1.5rem !important; }
        }

        .main-content { display: flex; flex-direction: column; align-items: center; }
        h1 { font-size: 2.2rem; text-shadow: 4px 4px #000; margin-bottom: 30px; }
        .btn-group { display: flex; flex-direction: column; gap: 10px; width: 220px; }

        button {
            background: #555; border: 4px solid #000; color: white;
            padding: 12px; font-family: 'Press Start 2P'; font-size: 10px;
            cursor: pointer; box-shadow: inset -3px -3px #222, inset 3px 3px #888;
        }

        /* --- STEVE (UNVERÄNDERT 10/10) --- */
        #char-section { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        
        .steve-svg {
            width: 100px; height: 180px;
            filter: drop-shadow(4px 4px 0px #000);
        }

        #player-name-display { font-size: 10px; background: rgba(0,0,0,0.5); padding: 5px; }

        /* --- SETTINGS DESIGN --- */
        #settings-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(20, 20, 20, 0.95); z-index: 100;
            flex-direction: column; align-items: center; justify-content: center;
        }
        .settings-list {
            display: flex; flex-direction: column; gap: 20px; width: 300px;
            background: #333; padding: 30px; border: 4px solid #000;
            position: relative;
        }

        .setting-row { 
            display: flex; justify-content: space-between; align-items: center; 
            font-size: 10px;
        }

        input { padding: 8px; font-family: 'Press Start 2P'; font-size: 10px; border: 3px solid #000; text-align: center; background: #eee; color: black; }
        
        .toggle-btn { width: 80px; padding: 5px; font-size: 8px; }
        
        .back-btn { position: absolute; bottom: -50px; left: 0; background: #a33; width: 100px; }

        .f-left { position: absolute; bottom: 10px; left: 10px; font-size: 7px; opacity: 0.5; }
        .f-right { position: absolute; bottom: 10px; right: 10px; font-size: 7px; opacity: 0.5; }
    </style>
</head>
<body>

    <div id="game-menu">
        <div class="main-content">
            <h1>VOXELBOUND</h1>
            <div class="btn-group">
                <button onclick="alert('Loading World...')">Play</button>
                <button onclick="toggleSettings()">Settings</button>
            </div>
        </div>

        <div id="char-section">
            <svg class="steve-svg" viewBox="0 0 80 140" xmlns="http://www.w3.org/2000/svg">
                <rect x="20" y="90" width="40" height="50" fill="#4a4abf" stroke="#000" stroke-width="2"/>
                <rect x="20" y="130" width="40" height="10" fill="#333"/>
                <rect x="2" y="40" width="18" height="50" fill="#00b9d1" stroke="#000" stroke-width="2"/>
                <rect x="60" y="40" width="18" height="50" fill="#00b9d1" stroke="#000" stroke-width="2"/>
                <rect x="20" y="40" width="40" height="52" fill="#00b9d1" stroke="#000" stroke-width="2"/>
                <rect x="20" y="0" width="40" height="40" fill="#d1a083" stroke="#000" stroke-width="2"/>
                <rect x="20" y="0" width="40" height="10" fill="#5b3927"/>
                <rect x="26" y="18" width="6" height="4" fill="#fff"/>
                <rect x="29" y="18" width="3" height="4" fill="#6e50c4"/>
                <rect x="48" y="18" width="6" height="4" fill="#fff"/>
                <rect x="48" y="18" width="3" height="4" fill="#6e50c4"/>
                <rect x="34" y="26" width="12" height="4" fill="#7b4d35"/>
            </svg>
            
            <div id="player-name-display">Player</div>
            <button onclick="alert('Soon!')" style="width: 130px; font-size: 7px; padding: 5px;">Dressing Room</button>
        </div>

        <div class="f-left">Made by MOE 2026</div>
        <div class="f-right">v0.0.1 ALPHA</div>
    </div>

    <div id="settings-overlay">
        <div class="settings-list">
            <h2 style="font-size: 14px; text-align: center;">SETTINGS</h2>
            
            <div style="display:flex; flex-direction:column; gap:5px;">
                <span style="font-size: 8px;">Character Name:</span>
                <input type="text" id="name-input" placeholder="Player">
            </div>

            <hr style="width: 100%; border: 1px solid #555;">

            <div class="setting-row">
                <span>Music:</span>
                <button class="toggle-btn" id="music-btn" onclick="toggleOption('music-btn')">ON</button>
            </div>

            <div class="setting-row">
                <span>Sounds:</span>
                <button class="toggle-btn" id="sound-btn" onclick="toggleOption('sound-btn')">ON</button>
            </div>

            <button class="back-btn" onclick="saveAndClose()">BACK</button>
        </div>
    </div>

    <script>
        function toggleSettings() {
            const o = document.getElementById('settings-overlay');
            o.style.display = (o.style.display === 'flex') ? 'none' : 'flex';
            if (o.style.display === 'flex') {
                document.getElementById('name-input').value = document.getElementById('player-name-display').innerText;
            }
        }

        function toggleOption(id) {
            const btn = document.getElementById(id);
            btn.innerText = (btn.innerText === 'ON') ? 'OFF' : 'ON';
            btn.style.background = (btn.innerText === 'ON') ? '#555' : '#333';
        }

        function saveAndClose() {
            const n = document.getElementById('name-input').value;
            if(n.trim()) {
                document.getElementById('player-name-display').innerText = n;
            }
            toggleSettings();
        }
    </script>
</body>
</html>
