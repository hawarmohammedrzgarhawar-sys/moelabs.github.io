<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survival World - Project MOE</title>
    <style>
        /* Grund-Setup */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000;
            color: white;
        }

        /* DER HINTERGRUND (Post-Apokalypse Style) */
        .bg-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            /* Ein Bild, das Ruinen und Natur mischt */
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)), 
                        url('https://images.unsplash.com/photo-1536697246741-98a6d9146011?q=80&w=2500&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            z-index: -2;
            filter: contrast(1.1) brightness(0.8);
        }

        /* DER CHARAKTER (Positioniert wie in deinen Beispielen) */
        .character-placeholder {
            position: absolute;
            bottom: 0;
            right: 5%;
            width: 40%;
            height: 70%;
            /* Hier simulieren wir die Silhouette eines Überlebenden mit Rucksack */
            background: url('https://i.imgur.com/39YvC9h.png'); /* Falls du ein eigenes PNG hast, hier rein */
            background-size: contain;
            background-repeat: no-repeat;
            background-position: bottom;
            z-index: -1;
            opacity: 0.9;
        }

        /* NEBEL EFFEKT für mehr Tiefe */
        .mist {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at bottom, rgba(40,60,40,0.2) 0%, transparent 80%);
            z-index: -1;
        }

        /* MENÜ CONTAINER */
        .main-menu {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            z-index: 10;
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 5rem);
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 8px;
            text-align: center;
            /* Der Glow, den du gut fandest */
            text-shadow: 0 0 20px rgba(100, 255, 100, 0.4), 4px 4px 15px rgba(0,0,0,1);
        }

        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            width: 260px;
            padding: 18px;
            background: rgba(20, 30, 20, 0.7);
            border: 1px solid #4a773c;
            color: #cfcfcf;
            font-size: 1.1rem;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .btn:hover {
            background: #4a773c;
            color: white;
            box-shadow: 0 0 25px rgba(74, 119, 60, 0.5);
            transform: translateY(-3px);
        }

        /* FOOTER (10/10 Style) */
        .footer {
            position: absolute;
            bottom: 25px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 50px;
            box-sizing: border-box;
            font-size: 0.85rem;
            font-weight: 300;
            letter-spacing: 1px;
            color: rgba(255,255,255,0.5);
        }
    </style>
</head>
<body>

    <div class="bg-layer"></div>
    <div class="mist"></div>
    <div class="character-placeholder"></div>

    <div class="main-menu">
        <h1>Survival<br>World</h1>
        
        <div class="btn-container">
            <button class="btn" onclick="startGame()">Start Game</button>
            <button class="btn" onclick="openSettings()">Settings</button>
        </div>
    </div>

    <div class="footer">
        <div>Version v0.1</div>
        <div>Made by MOE 2026</div>
    </div>

    <script>
        function startGame() {
            console.log("Spiel wird geladen...");
            // Hier kommt später der Wechsel zum Gameplay
        }

        function openSettings() {
            alert("Settings: Grafik, Sound, Steuerung");
        }
    </script>
</body>
</html>
