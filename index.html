<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survival Game - Project MOE</title>
    <style>
        /* --- CSS für das Design --- */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            background-color: #050a05; /* Noch dunklerer Basis-Ton */
            color: white;
        }

        /* --- VERBESSERTER, LEBENDIGER HINTERGRUND --- */
        .background-container {
            position: absolute;
            width: 110%; /* Etwas breiter für die Bewegung */
            height: 110%; /* Etwas höher für die Bewegung */
            top: -5%;
            left: -5%;
            /* Platzhalter Wald-Bild (wird abgedunkelt) */
            background-image: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, rgba(10,20,10,0.7) 100%), 
                              url('https://images.unsplash.com/photo-1511497584788-876760111969?q=80&w=2500&auto=format&fit=crop'); 
            background-size: cover;
            background-position: center;
            z-index: -2;
            filter: blur(2px); /* Subtiler Blur für Tiefe */
            animation: backgroundPan 30s linear infinite; /* Langsame Bewegung */
        }

        /* --- PULSIERENDER NEBEL EFFEKT --- */
        .fog-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(20,40,20,0.3) 0%, rgba(0,0,0,0) 70%);
            z-index: -1;
            animation: fogPulse 10s ease-in-out infinite;
        }

        /* Animation für die Hintergrund-Bewegung */
        @keyframes backgroundPan {
            0% { transform: translate(0, 0); }
            50% { transform: translate(-2%, -2%); }
            100% { transform: translate(0, 0); }
        }

        /* Animation für das Nebel-Pulsieren */
        @keyframes fogPulse {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.1); }
        }

        /* --- RESTLICHES MENÜ (Bleibt gleich) --- */
        .menu-container {
            position: relative; /* Wichtig für Z-Index */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            z-index: 1; /* Über dem Hintergrund */
        }

        h1 {
            font-size: clamp(3rem, 10vw, 5rem);
            margin-bottom: 50px;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 0 0 15px rgba(74, 119, 60, 0.8), 3px 3px 10px rgba(0,0,0,1); /* Grüner Glow */
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .menu-btn {
            width: 250px;
            padding: 15px;
            font-size: 1.2rem;
            background: rgba(30, 50, 30, 0.6); /* Transparenter */
            border: 2px solid #4a773c;
            color: white;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .menu-btn:hover {
            background: #4a773c;
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(74, 119, 60, 0.7);
        }

        .footer {
            position: absolute;
            bottom: 20px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            box-sizing: border-box;
            font-size: 0.9rem;
            opacity: 0.7;
            z-index: 1;
        }
    </style>
</head>
<body>

    <div class="background-container"></div>
    <div class="fog-overlay"></div>

    <div class="menu-container">
        <h1>SURVIVAL WORLD</h1>
        
        <div class="button-group">
            <button class="menu-btn" onclick="startGame()">Start Game</button>
            <button class="menu-btn" onclick="openSettings()">Settings</button>
        </div>
    </div>

    <div class="footer">
        <div id="version">Version v0.1</div>
        <div id="credits">Made by MOE 2026</div>
    </div>

    <script>
        // Erste Funktionen (bleiben gleich)
        function startGame() {
            alert("Game Starting...");
        }

        function openSettings() {
            alert("Settings coming soon!");
        }
    </script>
</body>
    </html>
