<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VoxelBound 3D</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Press Start 2P', cursive; background: #111; color: white; }
        
        /* Menü Style */
        #game-menu { display: flex; flex-direction: row; align-items: center; justify-content: center; height: 100vh; width: 100vw; gap: 60px; background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://www.transparenttextures.com/patterns/carbon-fibre.png'); position: absolute; z-index: 10; }
        @media (max-width: 600px) { #game-menu { flex-direction: column; gap: 40px; } h1 { font-size: 1.5rem !important; } }
        .main-content { display: flex; flex-direction: column; align-items: center; }
        h1 { font-size: 2.2rem; text-shadow: 4px 4px #000; margin-bottom: 30px; }
        .btn-group { display: flex; flex-direction: column; gap: 10px; width: 220px; }
        button { background: #555; border: 4px solid #000; color: white; padding: 12px; font-family: 'Press Start 2P'; font-size: 10px; cursor: pointer; box-shadow: inset -3px -3px #222, inset 3px 3px #888; }
        
        #char-section { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .steve-svg { width: 100px; height: 180px; filter: drop-shadow(4px 4px 0px #000); }
        
        /* Overlays */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(20, 20, 20, 0.95); z-index: 100; flex-direction: column; align-items: center; justify-content: center; }
        .window { display: flex; flex-direction: column; gap: 15px; width: 320px; background: #333; padding: 25px; border: 4px solid #000; position: relative; }
        .back-btn { position: absolute; bottom: -50px; left: 0; background: #a33; width: 100px; padding: 8px; font-size: 8px;}

        /* Crosshair */
        #crosshair { position: fixed; top: 50%; left: 50%; width: 20px; height: 20px; transform: translate(-50%, -50%); color: white; font-size: 20px; z-index: 5; pointer-events: none; display: none;}
        
        canvas { display: block; }
    </style>
</head>
<body>

    <div id="crosshair">+</div>

    <div id="game-menu">
        <div class="main-content">
            <h1>VOXELBOUND</h1>
            <div class="btn-group">
                <button onclick="startGame()">Play</button>
                <button onclick="openOverlay('settings-overlay')">Settings</button>
            </div>
        </div>
        <div id="char-section">
            <svg id="main-steve" class="steve-svg" viewBox="0 0 80 140">
                <rect x="20" y="90" width="40" height="50" fill="#4a4abf" stroke="#000" stroke-width="2"/>
                <rect id="shirt" x="20" y="40" width="40" height="52" fill="#00b9d1" stroke="#000" stroke-width="2"/>
                <rect x="20" y="0" width="40" height="40" fill="#d1a083" stroke="#000" stroke-width="2"/>
            </svg>
            <div id="player-name-display">Player</div>
            <button onclick="openOverlay('dressing-overlay')">Dressing Room</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, mesh;
        let blocks = [];

        function startGame() {
            document.getElementById('game-menu').style.display = 'none';
            document.getElementById('crosshair').style.display = 'block';
            init3D();
        }

        function init3D() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB); // Himmel Blau

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Licht
            const light = new THREE.AmbientLight(0x404040, 2);
            scene.add(light);
            const sun = new THREE.DirectionalLight(0xffffff, 0.8);
            sun.position.set(10, 20, 10);
            scene.add(sun);

            // Texturen (Simuliert mit Farben)
            const grassMat = new THREE.MeshLambertMaterial({ color: 0x4d9030 });

            // Welt generieren (Grasfläche)
            const geometry = new THREE.BoxGeometry(1, 1, 1);
            for(let x = -10; x < 10; x++) {
                for(let z = -10; z < 10; z++) {
                    const block = new THREE.Mesh(geometry, grassMat);
                    block.position.set(x, 0, z);
                    scene.add(block);
                    blocks.push(block);
                }
            }

            camera.position.set(0, 2, 5);
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        // --- Hilfsfunktionen für Overlays ---
        function openOverlay(id) { document.getElementById(id).style.display = 'flex'; }
        function closeOverlay(id) { document.getElementById(id).style.display = 'none'; }
    </script>
</body>
</html>
