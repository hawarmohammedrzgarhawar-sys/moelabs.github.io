<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON CYBER DASH: MOE EDITION</title>
    <style>
        :root { --neon: #00f2ff; --pink: #ff007f; --gold: #ffcc00; --bg: #020205; }
        * { margin: 0; padding: 0; box-sizing: border-box; overflow: hidden; user-select: none; touch-action: none; }
        body { background-color: #000; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; width: 100vw; }
        #game-container { position: relative; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background: var(--bg); }
        canvas { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        .system-badge { position: absolute; top: 20px; right: 20px; padding: 8px 15px; background: rgba(0,0,0,0.6); border: 1px solid var(--pink); border-radius: 4px; font-size: 12px; color: var(--pink); text-transform: uppercase; letter-spacing: 2px; z-index: 100; }

        .hud { position: absolute; top: 20px; left: 20px; pointer-events: none; z-index: 100; display: flex; gap: 30px; }
        .hud-label { font-size: 10px; color: #555; text-transform: uppercase; }
        .hud-value { font-size: 22px; color: var(--neon); font-weight: bold; }
        .coin-value { color: var(--gold); text-shadow: 0 0 10px var(--gold); }

        .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 200; transition: 0.5s; }
        h1 { font-size: clamp(2rem, 8vw, 4rem); color: var(--neon); text-shadow: 0 0 30px var(--neon); font-style: italic; margin-bottom: 5px; }
        .btn { background: transparent; border: 2px solid var(--neon); color: var(--neon); padding: 15px 50px; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 5px; cursor: pointer; transition: 0.3s; margin-top: 20px; }
        .btn:hover { background: var(--neon); color: #000; box-shadow: 0 0 40px var(--neon); }
    </style>
</head>
<body>

<div id="game-container">
    <div class="system-badge">System: <b>moe 2026</b></div>
    
    <div class="hud">
        <div>
            <div class="hud-label">Distance</div>
            <div id="scoreVal" class="hud-value">0000</div>
        </div>
        <div>
            <div class="hud-label">Wallet</div>
            <div id="coinVal" class="hud-value coin-value">0</div>
        </div>
    </div>

    <div id="menu" class="overlay">
        <h1 id="menuTitle">CYBER DASH</h1>
        <p id="menuSub" style="color: #666; letter-spacing: 3px;">SYSTEM READY_</p>
        <button class="btn" onclick="initGame()">Start Engine</button>
        <p style="margin-top: 20px; color: #333; font-size: 12px;">Highscore: <span id="hiScoreVal">0</span></p>
    </div>

    <canvas id="gameCanvas"></canvas>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const menu = document.getElementById('menu');
    
    const V_WIDTH = 1280, V_HEIGHT = 720;
    
    let state = {
        active: false,
        score: 0,
        coins: parseInt(localStorage.getItem('moeCoins')) || 0,
        hiScore: localStorage.getItem('moeDashHi') || 0,
        speed: 8,
        frame: 0
    };

    let player = { x: 150, y: 0, w: 50, h: 60, dy: 0, jump: -18, grav: 0.9, grounded: false, anim: 0 };
    let obstacles = [], coins = [], particles = [];
    let bgStars = [];

    function setup() {
        canvas.width = V_WIDTH; canvas.height = V_HEIGHT;
        for(let i=0; i<100; i++) bgStars.push({ x: Math.random()*V_WIDTH, y: Math.random()*V_HEIGHT, s: Math.random()*2 });
        updateHUD();
    }

    function updateHUD() {
        document.getElementById('scoreVal').innerText = Math.floor(state.score/10).toString().padStart(4, '0');
        document.getElementById('coinVal').innerText = state.coins;
        document.getElementById('hiScoreVal').innerText = state.hiScore;
    }

    function initGame() {
        menu.style.display = 'none';
        state.active = true;
        state.score = 0; state.speed = 9; state.frame = 0;
        obstacles = []; coins = [];
        player.y = V_HEIGHT - 160;
        loop();
    }

    function loop() {
        if(!state.active) return;
        update();
        draw();
        requestAnimationFrame(loop);
    }

    function update() {
        state.frame++;
        state.score++;
        player.dy += player.grav;
        player.y += player.dy;
        
        const ground = V_HEIGHT - 100;
        if(player.y + player.h > ground) {
            player.y = ground - player.h;
            player.dy = 0;
            player.grounded = true;
            player.anim += 0.15; // Leg animation speed
        } else {
            player.anim = 0; // Jump pose
        }

        if(state.frame % 500 === 0) state.speed += 0.5;

        // Spawn Logic
        if(state.frame % 80 === 0) obstacles.push({ x: V_WIDTH, w: 50, h: 50 + Math.random()*100 });
        if(state.frame % 120 === 0) coins.push({ x: V_WIDTH, y: V_HEIGHT - 200 - Math.random()*200, w: 30, h: 30, collected: false });

        // Move & Collide Obstacles
        obstacles.forEach((o, i) => {
            o.x -= state.speed;
            if(player.x < o.x + o.w && player.x + player.w > o.x && player.y + player.h > ground - o.h) gameOver();
            if(o.x + o.w < 0) obstacles.splice(i, 1);
        });

        // Move & Collect Coins
        coins.forEach((c, i) => {
            c.x -= state.speed;
            if(!c.collected && player.x < c.x + c.w && player.x + player.w > c.x && player.y < c.y + c.h && player.y + player.h > c.y) {
                c.collected = true;
                state.coins++;
                localStorage.setItem('moeCoins', state.coins);
                createExplosion(c.x, c.y, '#ffcc00', 10);
                updateHUD();
            }
            if(c.x + c.w < 0) coins.splice(i, 1);
        });

        particles.forEach((p, i) => {
            p.x += p.vx; p.y += p.vy; p.a -= 0.03;
            if(p.a <= 0) particles.splice(i, 1);
        });
    }

    function draw() {
        ctx.fillStyle = '#020205'; ctx.fillRect(0, 0, V_WIDTH, V_HEIGHT);

        // Stars
        ctx.fillStyle = "#fff";
        bgStars.forEach(s => {
            s.x -= state.speed * 0.1;
            if(s.x < 0) s.x = V_WIDTH;
            ctx.fillRect(s.x, s.y, s.s, s.s);
        });

        // Ground
        ctx.strokeStyle = varColor('--neon'); ctx.lineWidth = 4;
        ctx.beginPath(); ctx.moveTo(0, V_HEIGHT-100); ctx.lineTo(V_WIDTH, V_HEIGHT-100); ctx.stroke();

        // Coins
        coins.forEach(c => {
            if(!c.collected) {
                ctx.fillStyle = '#ffcc00'; ctx.shadowBlur = 15; ctx.shadowColor = '#ffcc00';
                ctx.beginPath(); ctx.arc(c.x + 15, c.y + 15, 12, 0, Math.PI*2); ctx.fill();
                ctx.shadowBlur = 0;
            }
        });

        // Obstacles
        ctx.fillStyle = '#ff007f';
        obstacles.forEach(o => ctx.fillRect(o.x, V_HEIGHT - 100 - o.h, o.w, o.h));

        // THE RUNNER (moe-bot)
        ctx.save();
        ctx.translate(player.x, player.y);
        ctx.shadowBlur = 20; ctx.shadowColor = varColor('--neon');
        ctx.fillStyle = varColor('--neon');
        
        // Body (leaning forward)
        ctx.fillRect(5, 5, 30, 35); 
        // Head
        ctx.fillRect(15, -10, 20, 15);
        // Eye (moe-style)
        ctx.fillStyle = "#fff"; ctx.fillRect(28, -5, 8, 3);
        
        // Animated Legs
        ctx.fillStyle = varColor('--neon');
        if(player.grounded) {
            let leg1 = Math.sin(player.anim) * 15;
            let leg2 = Math.sin(player.anim + Math.PI) * 15;
            ctx.fillRect(10, 40, 8, 10 + leg1); // Leg L
            ctx.fillRect(22, 40, 8, 10 + leg2); // Leg R
        } else {
            ctx.fillRect(5, 40, 8, 5); // Tucked legs for jump
            ctx.fillRect(25, 35, 8, 10);
        }
        ctx.restore();

        // Particles
        particles.forEach(p => {
            ctx.globalAlpha = p.a; ctx.fillStyle = p.c;
            ctx.fillRect(p.x, p.y, 4, 4);
        });
        ctx.globalAlpha = 1;
    }

    function createExplosion(x, y, color, count) {
        for(let i=0; i<count; i++) particles.push({ x: x, y: y, vx: (Math.random()-0.5)*12, vy: (Math.random()-0.5)*12, a: 1, c: color });
    }

    function gameOver() {
        state.active = false;
        let finalDist = Math.floor(state.score/10);
        if(finalDist > state.hiScore) {
            state.hiScore = finalDist;
            localStorage.setItem('moeDashHi', state.hiScore);
        }
        menu.style.display = 'flex';
        document.getElementById('menuTitle').innerText = "FATAL ERROR";
        document.getElementById('menuSub').innerText = "SCORE: " + finalDist + " | WALLET: " + state.coins;
        updateHUD();
    }

    function varColor(n) { return getComputedStyle(document.documentElement).getPropertyValue(n).trim(); }
    window.addEventListener('keydown', (e) => { if(e.code === 'Space') { if(player.grounded) { player.dy = player.jump; player.grounded = false; } } });
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); if(player.grounded) { player.dy = player.jump; player.grounded = false; } });

    setup();
</script>
</body>
</html>
