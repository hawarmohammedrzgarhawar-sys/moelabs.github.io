<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horror World - Project MOE</title>
    <style>
        /* Grund-Setup (Unverändert) */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000;
            color: white;
        }

        /* Hintergrund & Mist (Unverändert) */
        .bg-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.9)), 
                        url('https://images.unsplash.com/photo-1536697246741-98a6d9146011?q=80&w=2500&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            z-index: -2;
            filter: contrast(1.2) brightness(0.6) grayscale(0.3);
        }

        .character-placeholder {
            position: absolute;
            bottom: 0;
            right: 5%;
            width: 40%;
            height: 70%;
            background: url('https://i.imgur.com/39YvC9h.png'); 
            background-size: contain;
            background-repeat: no-repeat;
            background-position: bottom;
            z-index: -1;
            opacity: 0.8;
        }

        .mist {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at bottom, rgba(30,40,30,0.3) 0%, transparent 80%);
            z-index: -1;
        }

        /* MENÜ-LOGIK */
        .main-menu, .settings-menu, .level-menu, #gameViewport {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            z-index: 10;
            position: absolute;
            width: 100%;
            transition: 0.5s ease-in-out;
        }

        .settings-menu, .level-menu, #gameViewport {
            display: none;
        }

        .settings-menu, .level-menu { background: rgba(0, 0, 0, 0.92); }

        h1, h2 {
            font-size: clamp(2.2rem, 7vw, 4rem);
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 8px;
            text-align: center;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.3), 0 0 10px rgba(100, 255, 100, 0.2);
        }

        .btn {
            width: 260px;
            padding: 16px;
            background: rgba(15, 20, 15, 0.8);
            border: 1px solid #3d5e32;
            color: #bcbcbc;
            font-size: 1rem;
            letter-spacing: 2px;
            cursor: pointer;
            text-transform: uppercase;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.3s;
        }

        .btn:hover { background: #2d4a24; color: white; }

        /* LEVEL AUSWAHL (Kompakt) */
        .level-scroll-view { display: flex; gap: 15px; overflow-x: auto; padding: 20px; width: 90%; max-width: 1000px; }
        .level-card {
            min-width: 160px; height: 220px; background: #0a0a0a; border: 2px solid #222;
            display: flex; flex-direction: column; align-items: center; justify-content: space-around; padding: 15px; cursor: pointer;
        }
        .pixel-icon { width: 60px; height: 60px; background: #1a1a1a; border: 2px dashed #333; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
        .house-icon { border-color: #772222; color: #ff4444; }

        /* --- INGAME AREA --- */
        #gameViewport {
            background: #000;
            z-index: 100;
            overflow: hidden;
        }

        /* HUD (Heads-Up Display) */
        .hud {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            z-index: 110;
        }

        .hp-container {
            display: flex;
            gap: 5px;
            font-size: 1.5rem;
            color: #ff4d4d;
        }

        .settings-icon {
            font-size: 2rem;
            cursor: pointer;
            color: #666;
            transition: 0.3s;
        }
        .settings-icon:hover { color: #fff; transform: rotate(45deg); }

        /* RAUM SYSTEM (BASIC) */
        #gameWorld {
            width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0; /* Für den Wake-Up Effekt */
        }

        .room {
            width: 100%;
            height: 100%;
            display: none; /* Nur der aktive Raum wird gezeigt */
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        /* Zimmer 1 (Startraum) */
        #room1 { display: flex; background: radial-gradient(circle, #1a1313 0%, #000 100%); }

        .room-label {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 5px 10px;
        }

        .interaction-text {
            position: absolute;
            bottom: 10%;
            color: #888;
            font-style: italic;
            animation: pulse 2s infinite;
        }

        /* Animationen */
        @keyframes wakeUp {
            0% { opacity: 0; filter: blur(10px); }
            100% { opacity: 1; filter: blur(0); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        .status { font-weight: bold; color: #4dfd4d; }
        .status.off { color: #ff4d4d; }
    </style>
</head>
<body>

    <div class="bg-layer"></div>
    <div class="mist"></div>
    <div class="character-placeholder"></div>

    <div class="main-menu" id="mainMenu">
        <h1>Horror<br>World</h1>
        <div class="btn-container">
            <button class="btn" onclick="openLevelMenu()">Start Game</button>
            <button class="btn" onclick="toggleSettings()">Settings</button>
        </div>
    </div>

    <div class="level-menu" id="levelMenu">
        <h2>Select Area</h2>
        <div class="level-scroll-view">
            <div class="level-card" onclick="startDarkHouse()">
                <div class="pixel-icon house-icon">🏚️</div>
                <h3>Dark House</h3>
                <span class="diff">Easy</span>
            </div>
            <div class="level-card locked">
                <div class="pixel-icon">🔒</div>
                <h3>Coming Soon</h3>
            </div>
        </div>
        <button class="btn" style="margin-top: 30px; width: 140px;" onclick="backToMain()">Back</button>
    </div>

    <div id="gameViewport">
        <div class="hud">
            <div class="hp-container" id="hpDisplay">❤️❤️❤️❤️</div>
            <div class="settings-icon" onclick="toggleSettingsFromGame()">⚙️</div>
        </div>

        <div id="gameWorld">
            <div class="room" id="room1">
                <div class="room-label">Room #1: Bedroom</div>
                <h3 style="color: #444;">You woke up...</h3>
                <div class="interaction-text">Tap to stand up</div>
            </div>
            
            </div>
    </div>

    <div class="settings-menu" id="settingsMenu">
        <h2>Settings</h2>
        <div class="btn-container">
            <button class="btn" onclick="toggleSetting(this)">Sound: <span class="status">ON</span></button>
            <button class="btn" onclick="toggleSetting(this)">Music: <span class="status">ON</span></button>
            <button class="btn" id="settingsBackBtn" style="margin-top: 20px; border-color: #552222;" onclick="backToMain()">Back</button>
        </div>
    </div>

    <div class="footer">
        <div>v0.1</div>
        <div>Made by MOE 2026</div>
    </div>

    <script>
        const mainMenu = document.getElementById('mainMenu');
        const levelMenu = document.getElementById('levelMenu');
        const settingsMenu = document.getElementById('settingsMenu');
        const gameViewport = document.getElementById('gameViewport');
        const gameWorld = document.getElementById('gameWorld');

        function openLevelMenu() {
            mainMenu.style.display = 'none';
            levelMenu.style.display = 'flex';
        }

        function toggleSettings() {
            mainMenu.style.display = 'none';
            settingsMenu.style.display = 'flex';
            document.getElementById('settingsBackBtn').onclick = backToMain;
        }

        // Neue Funktion: Settings während des Spiels
        function toggleSettingsFromGame() {
            settingsMenu.style.display = (settingsMenu.style.display === 'flex') ? 'none' : 'flex';
            document.getElementById('settingsBackBtn').onclick = () => settingsMenu.style.display = 'none';
        }

        function backToMain() {
            levelMenu.style.display = 'none';
            settingsMenu.style.display = 'none';
            gameViewport.style.display = 'none';
            mainMenu.style.display = 'flex';
        }

        function startDarkHouse() {
            levelMenu.style.display = 'none';
            gameViewport.style.display = 'flex';
            
            // Dynamischer Start-Effekt
            gameWorld.style.opacity = "0";
            setTimeout(() => {
                gameWorld.style.animation = "wakeUp 4s forwards";
            }, 500);
        }

        function toggleSetting(btn) {
            const status = btn.querySelector('.status');
            if (status.innerText === 'ON') {
                status.innerText = 'OFF';
                status.classList.add('off');
            } else {
                status.innerText = 'ON';
                status.classList.remove('off');
            }
        }
    </script>
</body>
</html>
