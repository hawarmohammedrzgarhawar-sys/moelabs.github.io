<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Horror World - Project MOE</title>
    <style>
        /* --- DIESE BEREICHE WERDEN NICHT MEHR ANGEFASST --- */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Segoe UI', sans-serif; background-color: #000; color: white; }
        .bg-layer { position: absolute; width: 100%; height: 100%; background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.9)), url('https://images.unsplash.com/photo-1536697246741-98a6d9146011?q=80&w=2500&auto=format&fit=crop'); background-size: cover; z-index: -2; filter: brightness(0.5); }
        
        .main-menu, .settings-menu, .level-menu { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; z-index: 10; position: absolute; width: 100%; }
        .settings-menu, .level-menu { display: none; background: rgba(0, 0, 0, 0.95); }
        
        h1, h2 { font-size: clamp(2.2rem, 7vw, 4rem); margin-bottom: 30px; text-transform: uppercase; letter-spacing: 8px; text-align: center; text-shadow: 0 0 15px red; }
        .btn { width: 260px; padding: 16px; background: rgba(15, 20, 15, 0.8); border: 1px solid #3d5e32; color: #bcbcbc; font-size: 1rem; cursor: pointer; text-transform: uppercase; display: flex; justify-content: center; margin: 8px; transition: 0.3s; }
        .btn:hover { background: #2d4a24; color: white; }

        .level-scroll-view { display: flex; gap: 15px; overflow-x: auto; padding: 20px; width: 90%; max-width: 800px; }
        .level-card { min-width: 160px; height: 220px; background: #0a0a0a; border: 2px solid #222; display: flex; flex-direction: column; align-items: center; justify-content: space-around; padding: 15px; cursor: pointer; transition: 0.3s; }
        .level-card:hover { border-color: red; }
        .locked { opacity: 0.4; cursor: default; }

        .footer { position: absolute; bottom: 15px; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; box-sizing: border-box; font-size: 0.8rem; color: #555; z-index: 5; }

        /* --- INGAME BEREICH (9:16 DISPLAY) --- */
        #gameContainer { display: none; position: absolute; width: 100%; height: 100%; flex-direction: column; align-items: center; background: #000; z-index: 100; }
        
        #viewport916 {
            width: 100vw; height: calc(100vw * 16 / 9); max-height: 75vh;
            background: #050505; position: relative; overflow: hidden; border: 2px solid #1a1a1a;
            perspective: 1000px; margin-top: 10px;
        }

        #camera {
            width: 100%; height: 100%; position: absolute;
            transform-style: preserve-3d;
            transition: transform 2s ease-in-out;
            transform: translateY(180px) rotateX(25deg); /* Liege-Position */
        }

        /* Raum-Design */
        .wall { position: absolute; width: 1200px; height: 1200px; background: #111; border: 1px solid #000; }
        .floor { transform: rotateX(90deg) translateZ(-250px); background: radial-gradient(#222, #050505); width: 2000px; left: -400px; }
        .front-wall { transform: translateZ(-500px); background: #151515; display: flex; align-items: center; justify-content: center; }
        .door { width: 100px; height: 200px; background: #1a110a; border: 4px solid #000; box-shadow: 0 0 20px rgba(0,0,0,1); position: relative; }
        .door::before { content: "1"; position: absolute; top: 15px; width: 100%; text-align: center; color: #444; font-weight: bold; }

        /* Ingame UI */
        .ingame-hud { position: absolute; width: 100%; padding: 15px; display: flex; justify-content: space-between; z-index: 200; pointer-events: none; }
        .room-indicator { color: red; border: 1px solid red; padding: 3px 8px; font-size: 0.7rem; background: rgba(0,0,0,0.5); }
        .hud-right { display: flex; gap: 15px; pointer-events: all; align-items: center; }

        /* Steuerung */
        #externalControls { width: 100%; flex-grow: 1; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 15px; box-sizing: border-box; background: #000; }
        .ctrl-btn { background: #0f0f0f; border: 1px solid #333; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; color: #777; cursor: pointer; }
        .ctrl-btn:active { background: #222; color: #fff; }

        /* Effekte */
        .blur-overlay { position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(20px); z-index: 150; transition: 2.5s; }
        .is-awake .blur-overlay { opacity: 0; pointer-events: none; }
        .is-awake #camera { transform: translateY(0) rotateX(0deg); }

        .status { font-weight: bold; color: #4dfd4d; }
        .status.off { color: #ff4d4d; }
    </style>
</head>
<body>

    <div class="bg-layer"></div>

    <div class="main-menu" id="mainMenu">
        <h1>Horror<br>World</h1>
        <div class="btn-container">
            <button class="btn" onclick="openLevelMenu()">Start Game</button>
            <button class="btn" onclick="openGlobalSettings()">Settings</button>
        </div>
    </div>

    <div class="level-menu" id="levelMenu">
        <h2>Select Area</h2>
        <div class="level-scroll-view">
            <div class="level-card" onclick="startGame()">
                <div style="font-size: 3rem;">🏚️</div>
                <h3>Dark House</h3>
                <span style="color: #4dfd4d; font-size: 0.7rem;">EASY</span>
            </div>
            <div class="level-card locked">
                <div style="font-size: 3rem;">🔒</div>
                <h3>Coming Soon</h3>
                <span style="color: #444; font-size: 0.7rem;">LOCKED</span>
            </div>
        </div>
        <button class="btn" style="width: 150px; margin-top: 20px;" onclick="backToMain()">Back</button>
    </div>

    <div id="gameContainer">
        <div id="viewport916">
            <div class="blur-overlay" id="eyeBlur"></div>
            <div class="ingame-hud">
                <div class="room-indicator">ROOM #1</div>
                <div class="hud-right">
                    <div style="color: red; letter-spacing: 2px;">❤️❤️❤️❤️</div>
                    <div style="font-size: 1.8rem; cursor: pointer;" onclick="openIngameSettings()">⚙️</div>
                </div>
            </div>

            <div id="camera">
                <div class="wall floor"></div>
                <div class="wall front-wall">
                    <div class="door"></div>
                </div>
            </div>
            
            <div id="wakeLabel" style="position:absolute; bottom:25%; width:100%; text-align:center; z-index:160; color:#888; letter-spacing: 2px;" onclick="performWakeUp()">
                TAP TO WAKE UP
            </div>
        </div>

        <div id="externalControls">
            <div class="ctrl-btn" onclick="move('left')">⬅️</div>
            <div class="ctrl-btn" onclick="move('up')">⬆️</div>
            <div class="ctrl-btn" onclick="move('right')">➡️</div>
            <div class="ctrl-btn" style="font-size: 0.9rem; color: #522;">CROUCH</div>
            <div class="ctrl-btn" style="font-size: 0.9rem; color: #252;">JUMP</div>
            <div class="ctrl-btn" style="font-size: 0.8rem;" onclick="openIngameSettings()">PAUSE</div>
        </div>
    </div>

    <div class="settings-menu" id="settingsMenu">
        <h2>Settings</h2>
        <div class="btn-container">
            <button class="btn" onclick="toggleOption(this)">Sound: <span class="status">ON</span></button>
            <button class="btn" onclick="toggleOption(this)">Music: <span class="status">ON</span></button>
            <button class="btn" id="resumeBtn" style="display:none; background: #1a321a;" onclick="resumeGame()">Resume</button>
            <button class="btn" id="menuBackBtn" style="border-color: #622;" onclick="backToMain()">Back</button>
        </div>
    </div>

    <div class="footer">
        <div>v0.2</div>
        <div>Made by MOE 2026</div>
    </div>

    <script>
        const mainMenu = document.getElementById('mainMenu');
        const levelMenu = document.getElementById('levelMenu');
        const settingsMenu = document.getElementById('settingsMenu');
        const gameContainer = document.getElementById('gameContainer');
        const viewport = document.getElementById('viewport916');
        const resumeBtn = document.getElementById('resumeBtn');
        const menuBackBtn = document.getElementById('menuBackBtn');

        let rotY = 0;
        let posZ = -450;

        function openLevelMenu() {
            mainMenu.style.display = 'none';
            levelMenu.style.display = 'flex';
        }

        function openGlobalSettings() {
            mainMenu.style.display = 'none';
            settingsMenu.style.display = 'flex';
            resumeBtn.style.display = 'none';
            menuBackBtn.innerText = "Back";
            menuBackBtn.onclick = backToMain;
        }

        function openIngameSettings() {
            settingsMenu.style.display = 'flex';
            resumeBtn.style.display = 'flex';
            menuBackBtn.innerText = "Quit Game";
            menuBackBtn.onclick = () => location.reload();
        }

        function resumeGame() {
            settingsMenu.style.display = 'none';
        }

        function startGame() {
            levelMenu.style.display = 'none';
            gameContainer.style.display = 'flex';
        }

        function backToMain() {
            levelMenu.style.display = 'none';
            settingsMenu.style.display = 'none';
            mainMenu.style.display = 'flex';
        }

        function performWakeUp() {
            viewport.classList.add('is-awake');
            document.getElementById('wakeLabel').style.display = 'none';
        }

        function move(dir) {
            const cam = document.getElementById('camera');
            if(dir === 'left') rotY -= 15;
            if(dir === 'right') rotY += 15;
            if(dir === 'up') posZ += 30;
            cam.style.transform = `rotateY(${rotY}deg) translateZ(${posZ}px)`;
        }

        function toggleOption(btn) {
            const s = btn.querySelector('.status');
            if(s.innerText === 'ON') {
                s.innerText = 'OFF';
                s.classList.add('off');
            } else {
                s.innerText = 'ON';
                s.classList.remove('off');
            }
        }
    </script>
</body>
</html>
