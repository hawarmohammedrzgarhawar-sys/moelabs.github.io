<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoeLabs | Beta Phase</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* BASE STYLES */
        body {
            margin: 0;
            padding: 0;
            background-color: #0d0d0d;
            color: #ffffff;
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
        }

        /* FADE IN ANIMATION */
        .fade-wrapper {
            animation: fadeIn 1.8s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* HEADER & BETA TAG */
        header {
            padding: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1a1a1a;
        }

        .beta-label {
            color: #ff8c00;
            font-size: 0.8rem;
            font-weight: bold;
            border: 1px solid #ff8c00;
            padding: 4px 10px;
            border-radius: 50px;
            letter-spacing: 1px;
        }

        /* SIDEBAR NAVIGATION */
        .sidebar {
            position: fixed;
            top: 0;
            right: -320px;
            width: 300px;
            height: 100%;
            background: #111;
            z-index: 1000;
            transition: 0.5s cubic-bezier(0.8, 0, 0.2, 1);
            padding: 50px 30px;
            box-shadow: -10px 0 30px rgba(0,0,0,0.8);
        }

        .sidebar.open { right: 0; }

        .nav-item {
            list-style: none;
            margin: 35px 0;
            font-size: 1.3rem;
        }

        .nav-item a {
            text-decoration: none;
            color: #ccc;
            transition: 0.3s;
        }

        .nav-item a:hover { color: #ff8c00; padding-left: 10px; }

        .soon {
            font-size: 0.6rem;
            background: #222;
            color: #666;
            padding: 3px 7px;
            border-radius: 4px;
            margin-left: 8px;
        }

        /* HERO SECTION */
        .hero {
            text-align: center;
            padding: 120px 20px;
        }

        .hero h1 {
            font-size: 4rem;
            margin: 0;
            letter-spacing: -1px;
            background: linear-gradient(45deg, #fff, #ff8c00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-box {
            margin-top: 30px;
            color: #555;
            font-size: 1rem;
            font-style: italic;
        }

        .menu-btn {
            cursor: pointer;
            transition: 0.3s;
            z-index: 1001;
        }

        .menu-btn:hover { color: #ff8c00; }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            z-index: 999;
        }
    </style>
</head>
<body>

<div class="fade-wrapper">
    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <nav class="sidebar" id="sidebar">
        <div style="text-align: right; margin-bottom: 40px; cursor: pointer;" onclick="toggleMenu()">
            <i class="fa-solid fa-xmark fa-2xl"></i>
        </div>
        <ul style="padding: 0;">
            <li class="nav-item"><a href="#"><i class="fa-solid fa-magnifying-glass"></i> Search</a></li>
            <li class="nav-item"><a href="#"><i class="fa-solid fa-hashtag"></i> Socials</a></li>
            <li class="nav-item"><a href="#"><i class="fa-solid fa-user"></i> About</a></li>
            <li class="nav-item" style="opacity: 0.5;"><i class="fa-solid fa-gamepad"></i> Mini Games <span class="soon">SOON</span></li>
        </ul>
    </nav>

    <header>
        <div class="beta-label">(BETA PHASE)</div>
        <div class="menu-btn" onclick="toggleMenu()">
            <i class="fa-solid fa-ellipsis-vertical fa-2xl"></i>
        </div>
    </header>

    <main class="hero">
        <h1>MOELABS</h1>
        <p style="color: #888; margin-top: 10px;">The next generation of digital experience.</p>
        
        <div class="status-box">
            <i class="fa-solid fa-gear fa-spin"></i> System is under development. <br>
            Please stay patient. Everything is coming soon.
        </div>
    </main>
</div>

<script>
    function toggleMenu() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        sidebar.classList.toggle('open');
        overlay.style.display = sidebar.classList.contains('open') ? 'block' : 'none';
    }
</script>

</body>
</html>
