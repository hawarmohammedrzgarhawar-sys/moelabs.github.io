<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survival Game - Project MOE</title>
    <style>
        /* CSS für das Design */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            background-color: #0b1a0b; /* Dunkler Wald-Ton */
            color: white;
        }

        /* Dynamischer Hintergrund-Vibe */
        .background {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?ixlib=rb-1.2.1&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        .menu-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
        }

        h1 {
            font-size: clamp(3rem, 10vw, 5rem); /* Passt sich der Größe an */
            margin-bottom: 50px;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 3px 3px 10px rgba(0,0,0,0.8);
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .menu-btn {
            width: 250px;
            padding: 15px;
            font-size: 1.2rem;
            background: rgba(40, 60, 40, 0.8);
            border: 2px solid #4a773c;
            color: white;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .menu-btn:hover {
            background: #4a773c;
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(74, 119, 60, 0.6);
        }

        /* Footer Infos */
        .footer {
            position: absolute;
            bottom: 20px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            box-sizing: border-box;
            font-size: 0.9rem;
            opacity: 0.7;
        }

        /* Charakter Platzhalter */
        .char-preview {
            position: absolute;
            bottom: 50px;
            left: 10%;
            height: 40%;
            /* Hier kommt später das Bild rein */
        }
    </style>
</head>
<body>

    <div class="background"></div>

    <div class="menu-container">
        <h1>SURVIVAL WORLD</h1>
        
        <div class="button-group">
            <button class="menu-btn" onclick="startGame()">Start Game</button>
            <button class="menu-btn" onclick="openSettings()">Settings</button>
        </div>
    </div>

    <div class="footer">
        <div id="version">Version v0.1</div>
        <div id="credits">Made by MOE 2026</div>
    </div>

    <script>
        // Erste Funktionen
        function startGame() {
            alert("Game Starting... (Hier bauen wir als nächstes weiter!)");
        }

        function openSettings() {
            alert("Settings coming soon!");
        }
    </script>
</body>
</html>
