<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON CYBER DASH - MOI Labs</title>
    <style>
        :root { --neon: #00f2ff; --pink: #ff007f; --bg: #050505; }
        * { margin: 0; padding: 0; box-sizing: border-box; overflow: hidden; }
        body { 
            background-color: var(--bg); 
            font-family: 'Courier New', Courier, monospace;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; color: white;
        }
        #game-wrapper {
            position: relative; width: 100%; max-width: 900px;
            aspect-ratio: 16/9; border: 2px solid var(--neon);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2); background: #000;
        }
        canvas { width: 100%; height: 100%; display: block; }
        
        /* UI Elements */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; background: rgba(0,0,0,0.8); z-index: 10;
        }
        h1 { font-size: 3rem; color: var(--neon); text-shadow: 0 0 10px var(--neon); margin-bottom: 20px; }
        .btn {
            padding: 15px 40px; font-size: 1.5rem; background: transparent;
            border: 2px solid var(--pink); color: var(--pink); cursor: pointer;
            transition: 0.3s; text-transform: uppercase; letter-spacing: 3px;
        }
        .btn:hover { background: var(--pink); color: white; box-shadow: 0 0 20px var(--pink); }
        
        .stats { position: absolute; top: 10px; left: 20px; text-align: left; pointer-events: none; }
        .stats b { color: var(--neon); font-size: 1.2rem; }

        /* BRANDING */
        .footer-branding {
            position: absolute; bottom: 5px; width: 100%;
            display: flex; justify-content: space-between; padding: 0 15px;
            font-size: 10px; color: #444; text-transform: uppercase; letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div class="stats">
        SCORE: <b id="scoreLabel">0000</b><br>
        SPEED: <b id="speedLabel">1.0x</b>
    </div>

    <div id="start-screen" class="overlay">
        <h1>NEON DASH</h1>
        <button class="btn" onclick="startGame()">Init System</button>
        <p style="margin-top: 15px; color: #555;">Space or Tap to Jump</p>
    </div>

    <canvas id="ctx"></canvas>

    <div class="footer-branding">
        <span>Made by MOI 2026</span>
        <span>v1.0</span>
    </div>
</div>

<script>
const canvas = document.getElementById('ctx');
const scp = canvas.getContext('2d');
const scoreLabel = document.getElementById('scoreLabel');
const speedLabel = document.getElementById('speedLabel');

let gameActive = false;
let score = 0;
let gameSpeed = 5;
let frame = 0;

// Player Object
const player = {
    x: 80, y: 0, w: 30, h: 30,
    dy: 0, jumpForce: -12, gravity: 0.6,
    grounded: false,
    color: '#00f2ff'
};

let obstacles = [];
let particles = [];

function resize() {
    canvas.width = 1280;
    canvas.height = 720;
}
window.addEventListener('resize', resize);
resize();

// Input
function doJump() {
    if (player.grounded) {
        player.dy = player.jumpForce;
        player.grounded = false;
        createExplosion(player.x, player.y + player.h, '#ff007f');
    }
}
window.addEventListener('keydown', (e) => { if(e.code === 'Space') doJump(); });
canvas.addEventListener('touchstart', (e) => { e.preventDefault(); doJump(); });

function createExplosion(x, y, color) {
    for(let i=0; i<10; i++) {
        particles.push({
            x: x, y: y,
            vx: (Math.random() - 0.5) * 5,
            vy: (Math.random() - 0.5) * 5,
            life: 1.0, color: color
        });
    }
}

function startGame() {
    document.getElementById('start-screen').style.display = 'none';
    gameActive = true;
    score = 0; gameSpeed = 6; obstacles = []; particles = [];
    player.y = canvas.height - 100;
    requestAnimationFrame(update);
}

function update() {
    if(!gameActive) return;

    // Physics
    player.dy += player.gravity;
    player.y += player.dy;

    const floor = canvas.height - 80;
    if (player.y + player.h > floor) {
        player.y = floor - player.h;
        player.dy = 0;
        player.grounded = true;
    }

    // Spawn Obstacles
    if (frame % 100 === 0) {
        obstacles.push({ x: canvas.width, w: 40, h: 40 + Math.random() * 60, type: 'danger' });
    }

    // Move Objects
    obstacles.forEach((obs, index) => {
        obs.x -= gameSpeed;
        // Collision
        if (player.x < obs.x + obs.w && player.x + player.w > obs.x &&
            player.y < (canvas.height - 80) && player.y + player.h > (canvas.height - 80 - obs.h)) {
            gameOver();
        }
        if (obs.x + obs.w < 0) obstacles.splice(index, 1);
    });

    particles.forEach((p, i) => {
        p.x += p.vx; p.y += p.vy; p.life -= 0.02;
        if(p.life <= 0) particles.splice(i, 1);
    });

    score++;
    if(score % 500 === 0) gameSpeed += 0.5;

    draw();
    frame++;
    requestAnimationFrame(update);
}

function draw() {
    scp.fillStyle = '#000';
    scp.fillRect(0, 0, canvas.width, canvas.height);

    // Floor
    scp.strokeStyle = varColor('--neon');
    scp.lineWidth = 4;
    scp.beginPath();
    scp.moveTo(0, canvas.height - 80);
    scp.lineTo(canvas.width, canvas.height - 80);
    scp.stroke();

    // Grid Effect
    scp.strokeStyle = '#111';
    for(let i=0; i<canvas.width; i+=40) {
        scp.beginPath(); scp.moveTo(i - (frame % 40), canvas.height - 80);
        scp.lineTo(i - (frame % 40) - 100, canvas.height); scp.stroke();
    }

    // Draw Player
    scp.fillStyle = player.color;
    scp.shadowBlur = 15; scp.shadowColor = player.color;
    scp.fillRect(player.x, player.y, player.w, player.h);

    // Draw Obstacles
    scp.fillStyle = '#ff007f';
    scp.shadowColor = '#ff007f';
    obstacles.forEach(obs => {
        scp.fillRect(obs.x, canvas.height - 80 - obs.h, obs.w, obs.h);
    });

    // Draw Particles
    particles.forEach(p => {
        scp.globalAlpha = p.life;
        scp.fillStyle = p.color;
        scp.fillRect(p.x, p.y, 4, 4);
    });
    scp.globalAlpha = 1.0;
    scp.shadowBlur = 0;

    scoreLabel.innerText = score.toString().padStart(4, '0');
    speedLabel.innerText = (gameSpeed/5).toFixed(1) + 'x';
}

function varColor(name) { return getComputedStyle(document.documentElement).getPropertyValue(name); }

function gameOver() {
    gameActive = false;
    document.getElementById('start-screen').style.display = 'flex';
    document.querySelector('h1').innerText = "SYSTEM CRASH";
    document.querySelector('.btn').innerText = "Reboot";
}
</script>
</body>
</html>
