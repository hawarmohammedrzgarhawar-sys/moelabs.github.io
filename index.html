<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Snake Adventure</title>
    <style>
        :root {
            --primary: #00ff88;
            --secondary: #ff3e3e;
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        /* UI Elements */
        #game-container {
            position: relative;
            background: var(--glass);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(4px);
        }

        canvas {
            background-color: #000;
            display: block;
            border-radius: 10px;
            box-shadow: inset 0 0 20px rgba(0, 255, 136, 0.2);
            max-width: 90vw;
            max-height: 70vh;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-weight: bold;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Instructions */
        .instructions {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #94a3b8;
            text-align: center;
        }

        /* Mobile Controls */
        .controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            background: var(--glass);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            user-select: none;
        }

        .btn:active { background: var(--primary); color: black; }
        .up { grid-column: 2; }
        .left { grid-column: 1; }
        .down { grid-column: 2; }
        .right { grid-column: 3; }

        /* Footer Info */
        .footer {
            position: fixed;
            bottom: 10px;
            width: 100%;
            padding: 0 20px;
            box-sizing: border-box;
            font-size: 0.8rem;
            opacity: 0.6;
            display: flex;
            justify-content: space-between;
        }

        #score-val { color: var(--primary); }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="stats">
            <span>Score: <span id="score-val">0</span></span>
            <span style="font-size: 0.8rem; align-self: center;">Neon Snake</span>
        </div>

        <canvas id="snakeGame" width="400" height="400"></canvas>

        <div class="instructions">
            PC: Use <b>Arrow Keys</b> | Mobile: Use <b>Buttons</b>
        </div>

        <!-- Mobile Buttons (Hidden on larger screens via CSS if desired, here always on for demo) -->
        <div class="controls">
            <div class="btn up" onclick="changeDir('up')">▲</div>
            <div class="btn left" onclick="changeDir('left')">◀</div>
            <div class="btn down" onclick="changeDir('down')">▼</div>
            <div class="btn right" onclick="changeDir('right')">▶</div>
        </div>
    </div>

    <div class="footer">
        <span>Version: 1.0.4-Alpha</span>
        <span>Made by Mode</span>
    </div>

    <script>
        const canvas = document.getElementById("snakeGame");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score-val");

        const box = 20;
        let score = 0;
        let gameSpeed = 100;

        let snake = [{ x: 9 * box, y: 10 * box }];
        let food = {
            x: Math.floor(Math.random() * 19 + 1) * box,
            y: Math.floor(Math.random() * 19 + 1) * box
        };

        let d;

        document.addEventListener("keydown", direction);

        function direction(event) {
            if(event.keyCode == 37 && d != "RIGHT") d = "LEFT";
            else if(event.keyCode == 38 && d != "DOWN") d = "UP";
            else if(event.keyCode == 39 && d != "LEFT") d = "RIGHT";
            else if(event.keyCode == 40 && d != "UP") d = "DOWN";
        }

        function changeDir(dir) {
            if(dir == 'left' && d != "RIGHT") d = "LEFT";
            if(dir == 'up' && d != "DOWN") d = "UP";
            if(dir == 'right' && d != "LEFT") d = "RIGHT";
            if(dir == 'down' && d != "UP") d = "DOWN";
        }

        function collision(head, array) {
            for(let i = 0; i < array.length; i++) {
                if(head.x == array[i].x && head.y == array[i].y) return true;
            }
            return false;
        }

        function draw() {
            // Clear Canvas
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Snake
            for(let i = 0; i < snake.length; i++) {
                ctx.fillStyle = (i == 0) ? "#00ff88" : "#00aa66";
                ctx.shadowBlur = (i == 0) ? 15 : 0;
                ctx.shadowColor = "#00ff88";
                ctx.fillRect(snake[i].x, snake[i].y, box, box);
                ctx.strokeStyle = "#0f172a";
                ctx.strokeRect(snake[i].x, snake[i].y, box, box);
            }

            // Draw Food
            ctx.shadowBlur = 15;
            ctx.shadowColor = "#ff3e3e";
            ctx.fillStyle = "#ff3e3e";
            ctx.beginPath();
            ctx.arc(food.x + box/2, food.y + box/2, box/2 - 2, 0, Math.PI*2);
            ctx.fill();
            ctx.shadowBlur = 0;

            let snakeX = snake[0].x;
            let snakeY = snake[0].y;

            if( d == "LEFT") snakeX -= box;
            if( d == "UP") snakeY -= box;
            if( d == "RIGHT") snakeX += box;
            if( d == "DOWN") snakeY += box;

            // Check if snake eats food
            if(snakeX == food.x && snakeY == food.y) {
                score++;
                scoreElement.innerHTML = score;
                food = {
                    x: Math.floor(Math.random() * 19 + 1) * box,
                    y: Math.floor(Math.random() * 19 + 1) * box
                };
            } else {
                snake.pop();
            }

            let newHead = { x: snakeX, y: snakeY };

            // Game Over conditions
            if(snakeX < 0 || snakeX >= canvas.width || snakeY < 0 || snakeY >= canvas.height || collision(newHead, snake)) {
                clearInterval(game);
                alert("Game Over! Score: " + score);
                location.reload();
            }

            snake.unshift(newHead);
        }

        let game = setInterval(draw, gameSpeed);
    </script>
</body>
</html>
