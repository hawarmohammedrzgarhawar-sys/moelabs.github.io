<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Runner 2026</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-pink: #ff00ea;
            --neon-yellow: #fbff00;
            --bg-dark: #0a0a0a;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-dark);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: block;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
            background: linear-gradient(to bottom, #111, #222);
        }

        /* UI Overlays */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .hidden { display: none !important; }

        h1 {
            font-size: 4rem;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue);
        }

        .stats-display {
            position: absolute;
            top: 20px;
            width: 90%;
            display: flex;
            justify-content: space-between;
            font-size: 1.5rem;
            font-weight: bold;
            pointer-events: none;
            text-shadow: 2px 2px 4px black;
        }

        button {
            padding: 15px 40px;
            font-size: 1.2rem;
            background: transparent;
            color: var(--neon-pink);
            border: 2px solid var(--neon-pink);
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s;
            font-weight: bold;
            margin-top: 20px;
        }

        button:hover {
            background: var(--neon-pink);
            color: white;
            box-shadow: 0 0 20px var(--neon-pink);
        }

        /* Branding Footer */
        .footer-left {
            position: absolute;
            bottom: 10px;
            left: 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
        }

        .footer-right {
            position: absolute;
            bottom: 10px;
            right: 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
        }

        .level-up-text {
            position: absolute;
            top: 40%;
            font-size: 3rem;
            color: var(--neon-yellow);
            animation: fadeUp 1.5s forwards;
            pointer-events: none;
        }

        @keyframes fadeUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-50px); }
        }
    </style>
</head>
<body>

<div id="game-container">
    <div class="stats-display">
        <div id="score-ui">Score: 0</div>
        <div id="level-ui" style="color: var(--neon-pink);">Level: 1</div>
        <div id="coins-ui" style="color: var(--neon-yellow);">Coins: 0</div>
    </div>

    <div id="start-menu" class="overlay">
        <h1>Cyber Runner</h1>
        <p>Jump over obstacles and collect coins!</p>
        <p style="font-size: 0.8rem;">(Press SPACE or Tap to Jump)</p>
        <button onclick="startGame()">Start Mission</button>
    </div>

    <div id="game-over" class="overlay hidden">
        <h1 style="color: var(--neon-pink); text-shadow: 0 0 10px var(--neon-pink);">System Failure</h1>
        <p id="final-score">Score: 0</p>
        <p id="final-coins">Coins Collected: 0</p>
        <button onclick="startGame()">Reboot System</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div class="footer-left">Made by Moe 2026</div>
    <div class="footer-right">v1.2.4 Final</div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // UI Elements
    const startMenu = document.getElementById('start-menu');
    const gameOverScreen = document.getElementById('game-over');
    const scoreUI = document.getElementById('score-ui');
    const coinsUI = document.getElementById('coins-ui');
    const levelUI = document.getElementById('level-ui');

    // Game Constants
    let gameActive = false;
    let score = 0;
    let coins = 0;
    let level = 1;
    let gameSpeed = 5;
    let gravity = 0.8;
    let obstacles = [];
    let collectibles = [];
    let animationId;

    // Resize Canvas
    function resize() {
        canvas.width = window.innerWidth * 0.8;
        canvas.height = 400;
    }
    window.addEventListener('resize', resize);
    resize();

    // Player Object
    const player = {
        x: 50,
        y: 300,
        width: 40,
        height: 40,
        color: '#00f2ff',
        dy: 0,
        jumpForce: -15,
        grounded: false,
        draw() {
            ctx.fillStyle = this.color;
            ctx.shadowBlur = 15;
            ctx.shadowColor = this.color;
            ctx.fillRect(this.x, this.y, this.width, this.height);
            ctx.shadowBlur = 0;
            
            // Player Eye/Detail
            ctx.fillStyle = "white";
            ctx.fillRect(this.x + 25, this.y + 10, 10, 5);
        },
        jump() {
            if (this.grounded) {
                this.dy = this.jumpForce;
                this.grounded = false;
            }
        },
        update() {
            if (this.y + this.height < canvas.height) {
                this.dy += gravity;
                this.grounded = false;
            } else {
                this.dy = 0;
                this.grounded = true;
                this.y = canvas.height - this.height;
            }
            this.y += this.dy;
            this.draw();
        }
    };

    class Obstacle {
        constructor() {
            this.width = 20 + Math.random() * 30;
            this.height = 30 + Math.random() * 50;
            this.x = canvas.width;
            this.y = canvas.height - this.height;
            this.color = '#ff00ea';
        }
        draw() {
            ctx.fillStyle = this.color;
            ctx.shadowBlur = 10;
            ctx.shadowColor = this.color;
            ctx.fillRect(this.x, this.y, this.width, this.height);
            ctx.shadowBlur = 0;
        }
        update() {
            this.x -= gameSpeed;
            this.draw();
        }
    }

    class Coin {
        constructor() {
            this.radius = 8;
            this.x = canvas.width + 100;
            this.y = canvas.height - (50 + Math.random() * 150);
            this.color = '#fbff00';
        }
        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = this.color;
            ctx.shadowBlur = 15;
            ctx.shadowColor = this.color;
            ctx.fill();
            ctx.closePath();
            ctx.shadowBlur = 0;
        }
        update() {
            this.x -= gameSpeed;
            this.draw();
        }
    }

    function spawnManager() {
        if (Math.random() < 0.02) obstacles.push(new Obstacle());
        if (Math.random() < 0.01) collectibles.push(new Coin());
    }

    function checkCollision(rect1, rect2) {
        return rect1.x < rect2.x + rect2.width &&
               rect1.x + rect1.width > rect2.x &&
               rect1.y < rect2.y + rect2.height &&
               rect1.y + rect1.height > rect2.y;
    }

    function checkCoinCollision(p, c) {
        let dx = p.x + p.width/2 - c.x;
        let dy = p.y + p.height/2 - c.y;
        let distance = Math.sqrt(dx * dx + dy * dy);
        return distance < p.width/2 + c.radius;
    }

    function handleLeveling() {
        let newLevel = Math.floor(score / 1000) + 1;
        if (newLevel > level) {
            level = newLevel;
            gameSpeed += 0.8;
            showLevelUp();
        }
    }

    function showLevelUp() {
        const txt = document.createElement('div');
        txt.className = 'level-up-text';
        txt.innerText = `LEVEL UP: ${level}`;
        document.getElementById('game-container').appendChild(txt);
        setTimeout(() => txt.remove(), 1500);
    }

    function update() {
        if (!gameActive) return;

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Background Grid Effect
        ctx.strokeStyle = "rgba(0, 242, 255, 0.05)";
        for(let i=0; i<canvas.width; i+=50) {
            ctx.beginPath();
            ctx.moveTo(i - (score % 50), 0);
            ctx.lineTo(i - (score % 50), canvas.height);
            ctx.stroke();
        }

        player.update();
        spawnManager();

        // Handle Obstacles
        obstacles.forEach((obs, index) => {
            obs.update();
            if (checkCollision(player, obs)) endGame();
            if (obs.x + obs.width < 0) obstacles.splice(index, 1);
        });

        // Handle Coins
        collectibles.forEach((coin, index) => {
            coin.update();
            if (checkCoinCollision(player, coin)) {
                coins++;
                score += 100;
                collectibles.splice(index, 1);
                coinsUI.innerText = `Coins: ${coins}`;
            }
            if (coin.x < 0) collectibles.splice(index, 1);
        });

        score++;
        scoreUI.innerText = `Score: ${score}`;
        levelUI.innerText = `Level: ${level}`;
        
        handleLeveling();
        animationId = requestAnimationFrame(update);
    }

    function startGame() {
        // Reset States
        score = 0;
        coins = 0;
        level = 1;
        gameSpeed = 5;
        obstacles = [];
        collectibles = [];
        gameActive = true;
        
        // UI Reset
        startMenu.classList.add('hidden');
        gameOverScreen.classList.add('hidden');
        scoreUI.innerText = "Score: 0";
        coinsUI.innerText = "Coins: 0";
        levelUI.innerText = "Level: 1";

        update();
    }

    function endGame() {
        gameActive = false;
        cancelAnimationFrame(animationId);
        document.getElementById('final-score').innerText = `Final Score: ${score}`;
        document.getElementById('final-coins').innerText = `Coins Collected: ${coins}`;
        gameOverScreen.classList.remove('hidden');
    }

    // Input Handling
    window.addEventListener('keydown', (e) => {
        if (e.code === 'Space' || e.code === 'ArrowUp') {
            player.jump();
            if(!gameActive && startMenu.classList.contains('hidden')) startGame();
        }
    });

    window.addEventListener('touchstart', () => {
        player.jump();
    });

</script>
</body>
</html>
