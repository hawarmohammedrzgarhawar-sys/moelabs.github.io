<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VoxelBound</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: 'Press Start 2P', cursive;
            background: #111; color: white;
        }

        /* --- HAUPTMENÜ (UNVERÄNDERT) --- */
        #game-menu {
            display: flex; flex-direction: row; align-items: center; justify-content: center; 
            height: 100vh; width: 100vw; gap: 60px;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
        }

        @media (max-width: 600px) {
            #game-menu { flex-direction: column; gap: 40px; }
            h1 { font-size: 1.5rem !important; }
        }

        .main-content { display: flex; flex-direction: column; align-items: center; }
        h1 { font-size: 2.2rem; text-shadow: 4px 4px #000; margin-bottom: 30px; }
        .btn-group { display: flex; flex-direction: column; gap: 10px; width: 220px; }

        button {
            background: #555; border: 4px solid #000; color: white;
            padding: 12px; font-family: 'Press Start 2P'; font-size: 10px;
            cursor: pointer; box-shadow: inset -3px -3px #222, inset 3px 3px #888;
        }

        /* --- DER NEUE STEVE (GENAU NACH BILD) --- */
        #char-section { display: flex; flex-direction: column; align-items: center; gap: 15px; position: relative; }

        .steve-container {
            width: 80px; height: 160px;
            position: relative;
            image-rendering: pixelated;
        }

        /* Kopf */
        .steve-head {
            width: 40px; height: 40px;
            background: #d1a083; /* Hautfarbe */
            position: absolute; left: 20px; top: 0;
            border: 3px solid #000;
            box-shadow: 
                inset 0 10px 0 #5b3927, /* Haare oben */
                inset 8px 18px 0 #fff, inset 12px 18px 0 #6e50c4, /* Auge links */
                inset 24px 18px 0 #fff, inset 28px 18px 0 #6e50c4, /* Auge rechts */
                inset 14px 28px 0 #7b4d35; /* Nase/Bart */
        }

        /* Körper */
        .steve-body {
            width: 40px; height: 50px;
            background: #00b9d1; /* Cyan Shirt */
            position: absolute; left: 20px; top: 43px;
            border: 3px solid #000;
        }

        /* Arme */
        .steve-arm-l, .steve-arm-r {
            width: 18px; height: 50px;
            background: #00b9d1;
            position: absolute; top: 43px;
            border: 3px solid #000;
        }
        .steve-arm-l { left: -1px; border-right: none; }
        .steve-arm-r { left: 63px; border-left: none; }

        /* Beine */
        .steve-legs {
            width: 40px; height: 55px;
            background: #4a4abf; /* Lila-Blaue Hose */
            position: absolute; left: 20px; top: 96px;
            border: 3px solid #000;
            box-shadow: inset 0 -10px 0 #333; /* Schuhe */
        }

        #player-name-display { font-size: 10px; background: rgba(0,0,0,0.5); padding: 5px; margin-top: 10px; }

        /* --- SETTINGS (UNVERÄNDERT) --- */
        #settings-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(20, 20, 20, 0.95); z-index: 100;
            flex-direction: column; align-items: center; justify-content: center;
        }
        .settings-list {
            display: flex; flex-direction: column; gap: 20px; width: 300px;
            background: #333; padding: 30px; border: 4px solid #000;
            position: relative;
        }
        input { padding: 8px; font-family: 'Press Start 2P'; font-size: 10px; border: 3px solid #000; text-align: center; }
        .back-btn { position: absolute; bottom: -50px; left: 0; background: #a33; width: 100px; }

        .f-left { position: absolute; bottom: 10px; left: 10px; font-size: 7px; opacity: 0.5; }
        .f-right { position: absolute; bottom: 10px; right: 10px; font-size: 7px; opacity: 0.5; }
    </style>
</head>
<body>

    <div id="game-menu">
        <div class="main-content">
            <h1>VOXELBOUND</h1>
            <div class="btn-group">
                <button onclick="alert('Loading World...')">Play</button>
                <button onclick="toggleSettings()">Settings</button>
            </div>
        </div>

        <div id="char-section">
            <div class="steve-container">
                <div class="steve-arm-l"></div>
                <div class="steve-head"></div>
                <div class="steve-body"></div>
                <div class="steve-arm-r"></div>
                <div class="steve-legs"></div>
            </div>
            <div id="player-name-display">Player</div>
            <button onclick="alert('Soon!')" style="width: 130px; font-size: 7px; padding: 5px;">Dressing Room</button>
        </div>

        <div class="f-left">Made by MOE 2026</div>
        <div class="f-right">v0.0.1 ALPHA</div>
    </div>

    <div id="settings-overlay">
        <div class="settings-list">
            <h2 style="font-size: 14px; text-align: center;">SETTINGS</h2>
            <div style="display:flex; flex-direction:column; gap:5px;">
                <span style="font-size: 8px;">Character Name:</span>
                <input type="text" id="name-input" placeholder="Player">
            </div>
            <button class="back-btn" onclick="saveAndClose()">BACK</button>
        </div>
    </div>

    <script>
        function toggleSettings() {
            const o = document.getElementById('settings-overlay');
            o.style.display = (o.style.display === 'flex') ? 'none' : 'flex';
            if (o.style.display === 'flex') {
                document.getElementById('name-input').value = document.getElementById('player-name-display').innerText;
            }
        }
        function saveAndClose() {
            const n = document.getElementById('name-input').value;
            if(n.trim()) document.getElementById('player-name-display').innerText = n;
            toggleSettings();
        }
    </script>
</body>
</html>
